<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>東瀛池上飯包 訂餐系統 V2.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, 'LiHei Pro', '微軟正黑體', sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f5f5f4; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a8a29e; }
    
    /* 彈出視窗動畫 (電腦版置中放大，手機版由下往上滑出抽屜) */
    .modal-overlay { animation: fadeIn 0.2s ease-out forwards; }
    
    @media (min-width: 641px) {
      .modal-content { animation: scaleIn 0.2s ease-out forwards; }
    }
    @media (max-width: 640px) {
      .modal-content { 
        margin-top: auto; 
        border-radius: 1.5rem 1.5rem 0 0 !important;
        animation: slideUp 0.3s ease-out forwards; 
      }
    }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  </style>
</head>
<body class="bg-stone-50 text-stone-800 pb-24 lg:pb-10 min-h-screen relative">

  <header class="bg-emerald-800 text-stone-50 p-4 shadow-md sticky top-0 z-30">

        <h1 class="text-2xl font-bold tracking-wider">東瀛池上飯包 <span class="text-sm font-normal text-emerald-200">五華店</span></h1>
      </div>
      
      <div id="clock-container" class="flex items-center gap-2 px-4 py-1.5 rounded-full bg-black/20 text-emerald-50 transition-all duration-300">

        <span id="current-time" class="tracking-widest font-mono text-lg">--:--:--</span>
        <span id="time-warning" class="hidden text-xs ml-1 bg-amber-600 text-white px-2 py-0.5 rounded-full animate-pulse font-bold shadow-sm">已截止</span>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-4 mt-2">
    <div class="bg-white rounded-xl shadow-sm p-4 mb-6 border-l-4 border-emerald-600 flex flex-col md:flex-row gap-4 justify-between items-start md:items-center">
      <div>
        <h2 id="today-date" class="text-lg font-bold text-emerald-900 mb-2">📅 載入中...</h2>
        <div class="flex flex-col gap-1.5 text-sm text-stone-600">
          <a href="tel:0228578299" class="flex items-center gap-2 hover:text-emerald-700 w-fit font-medium">
            <i data-lucide="phone" class="w-4 h-4 text-emerald-600"></i> 02-2857-8299
          </a>
          <a href="https://maps.google.com/?q=新北市三重區碧華街317號" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 hover:text-emerald-700 w-fit font-medium">
            <i data-lucide="map-pin" class="w-4 h-4 text-emerald-600"></i> 241新北市三重區富貴里五華街135號
          </a>
        </div>
      </div>
      <div class="text-sm bg-emerald-50 text-emerald-800 p-3 rounded-lg border border-emerald-100/50">
        <p class="mb-1">💡 點餐截止時間：每日 <strong class="text-amber-600 text-base">10:00</strong></p>
        <p class="mb-1">💡 系統說明：本系統採<strong class="font-bold">手動清除機制</strong>，資料跨天保留。</p>
        <p class="text-xs text-emerald-600 mt-2 font-medium">✨ 嚴選好米．新鮮食材．風味木盒</p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 relative">
      
      <div id="tab-order-section" class="lg:col-span-7 space-y-6 block">
        <div class="bg-white rounded-2xl shadow-sm p-5 border border-stone-200">
          <h3 id="form-title" class="text-xl font-bold text-stone-800 mb-4 flex items-center gap-2 border-b pb-3 border-stone-100">
            <span class="bg-emerald-100 text-emerald-700 p-1.5 rounded-lg"><i data-lucide="utensils" class="w-5 h-5"></i></span> 
            我要點餐
          </h3>
          
          <div class="mb-6">
            <label class="block text-sm font-bold text-stone-700 mb-2">點餐者姓名 <span class="text-amber-500">*</span></label>
            <input 
              type="text" 
              id="user-name-input"
              placeholder="請輸入您的姓名..."
              class="w-full p-3.5 border-2 border-stone-200 rounded-xl focus:ring-0 focus:border-emerald-500 bg-stone-50 focus:bg-white text-base outline-none transition-colors"
            >
          </div>

          <div class="mb-6">
            <label class="block text-sm font-bold text-stone-700 mb-3">選擇餐點 (點擊加入清單)</label>
            <div id="menu-container" class="grid grid-cols-2 sm:grid-cols-3 gap-3">
              </div>
          </div>

          <div class="bg-stone-50 p-4 rounded-xl border border-stone-200 shadow-inner">
            <h4 class="font-bold text-stone-800 mb-3 flex items-center gap-2">
               <i data-lucide="shopping-bag" class="w-5 h-5 text-amber-600"></i> 我的餐盒清單
            </h4>
            
            <div id="cart-items-container" class="space-y-3">
              <p class="text-stone-400 text-sm text-center py-6">尚未選擇任何餐點</p>
            </div>
            
            <div class="flex justify-between items-center pt-4 border-t border-stone-200 mt-4">
              <span class="font-bold text-stone-600">總金額</span>
              <span class="text-3xl font-bold text-amber-600">$<span id="cart-total">0</span></span>
            </div>
          </div>

          <button 
            id="submit-order-btn"
            class="w-full mt-6 bg-emerald-700 hover:bg-emerald-800 active:scale-[0.98] text-white font-bold text-lg py-4 rounded-xl shadow-lg transition-transform flex justify-center items-center gap-2"
          >
            <i data-lucide="check-circle" class="w-6 h-6"></i>
            <span id="submit-btn-text">確認送出訂單</span>
          </button>
          
          <button 
             id="cancel-edit-btn"
            class="hidden w-full mt-3 text-stone-500 text-sm hover:text-emerald-700 hover:underline py-2 font-medium"
          >
            取消修改，回到新增模式
          </button>
        </div>
      </div>

      <div id="tab-list-section" class="lg:col-span-5 hidden lg:block">
        <div class="bg-white rounded-2xl shadow-sm p-5 lg:sticky lg:top-24 border border-stone-200">
          <div class="flex justify-between items-center mb-4 border-b pb-3 border-stone-100">
            <h3 class="text-xl font-bold text-stone-800 flex items-center gap-2">
              <span class="bg-stone-100 text-stone-600 p-1.5 rounded-lg"><i data-lucide="users" class="w-5 h-5"></i></span>
              訂購總表 (<span id="orders-count" class="text-emerald-700">0</span>)
            </h3>
            <button 
              id="clear-all-btn"
              class="text-xs bg-stone-100 text-stone-500 hover:bg-red-50 hover:text-red-600 border border-stone-200 hover:border-red-200 px-3 py-2 rounded-lg font-bold flex items-center gap-1.5 transition-colors"
            >
              <i data-lucide="trash-2" class="w-4 h-4"></i> 手動清除資料
            </button>
          </div>

          <div id="orders-container" class="max-h-[500px] overflow-y-auto pr-2 space-y-3 custom-scrollbar">
            <p class="text-stone-400 text-center py-12">資料載入中...</p>
          </div>

          <div class="flex justify-between items-end mt-5 pt-5 border-t-2 border-stone-100">
            <span class="text-lg font-bold text-stone-600">累積總金額</span>
            <span class="text-4xl font-bold text-amber-600 tracking-tight">$<span id="orders-grand-total">0</span></span>
          </div>

          <button 
            id="copy-orders-btn"
            class="w-full mt-6 bg-stone-800 hover:bg-stone-900 active:scale-[0.98] text-white font-bold py-3.5 rounded-xl shadow-md transition-transform flex justify-center items-center gap-2"
          >
            <i data-lucide="copy" class="w-5 h-5"></i> 一鍵複製明細 (LINE專用)
          </button>
        </div>
      </div>
    </div>
  </main>

  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 flex lg:hidden shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-40 pb-safe">
    <button id="nav-order-btn" class="flex-1 py-3 flex flex-col items-center justify-center gap-1 text-emerald-700 bg-emerald-50 transition-colors border-t-2 border-emerald-600">
      <i data-lucide="utensils" class="w-6 h-6"></i>
      <span class="text-xs font-bold">我要點餐</span>
    </button>
    <button id="nav-list-btn" class="flex-1 py-3 flex flex-col items-center justify-center gap-1 text-stone-400 hover:text-stone-600 transition-colors border-t-2 border-transparent">
      <div class="relative">
        <i data-lucide="file-text" class="w-6 h-6"></i>
        <span id="mobile-badge" class="absolute -top-1 -right-2 bg-amber-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
      </div>
      <span class="text-xs font-bold">訂單總表</span>
    </button>
  </div>

  <div id="custom-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-stone-900/60 lg:p-4 modal-overlay backdrop-blur-sm">
    <div class="bg-white shadow-2xl w-full max-w-md overflow-hidden modal-content rounded-xl">
      <div id="modal-header" class="p-5 flex items-center gap-3 text-white bg-emerald-700">
        <i id="modal-icon" data-lucide="info" class="w-6 h-6"></i>
        <h3 id="modal-title" class="font-bold text-lg tracking-wide">標題</h3>
      </div>
      <div id="modal-message" class="p-6 text-stone-700 text-center font-medium leading-relaxed text-lg">
        訊息內容
      </div>
      <div class="p-4 bg-stone-50 flex justify-end gap-3 border-t border-stone-100 rounded-b-xl lg:rounded-b-none">
        <button id="modal-cancel-btn" class="hidden px-5 py-2.5 text-stone-600 hover:bg-stone-200 rounded-lg font-bold transition-colors">取消</button>
        <button id="modal-confirm-btn" class="px-6 py-2.5 rounded-lg font-bold text-white shadow-md transition-colors bg-emerald-700 hover:bg-emerald-800">確定</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    
    // 您的 Firebase 設定保持不變
    const firebaseConfig = {
      apiKey: "AIzaSyBnWJzwGs7v0y-4TZBak1gNbDSzZp601_k",
      authDomain: "myorder-86db9.firebaseapp.com",
      projectId: "myorder-86db9",
      storageBucket: "myorder-86db9.firebasestorage.app",
      messagingSenderId: "472751421979",
      appId: "1:472751421979:web:a286c3bc4ad419ed1f16be",
      measurementId: "G-ZNRJJ4JQPH"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const FIREBASE_APP_ID = "myorder-86db9";
    
    const state = {
      user: null,
      orders: [],
      cart: [],
      editingOrderId: null,
      isPastCutoff: false
    };

    // 精準拆分與更新的新菜單資料
    const MENU_DATA = [
      // 便當類
      { id: 'b1', category: '便當類', name: '招牌飯', price: 85 },
      { id: 'b2', category: '便當類', name: '蝦捲飯', price: 85 },
      { id: 'b3', category: '便當類', name: '香腸飯', price: 85 },
      { id: 'b4', category: '便當類', name: '滷棒腿飯', price: 90 },
      { id: 'b5', category: '便當類', name: '咔啦雞飯', price: 90 },
      { id: 'b6', category: '便當類', name: '鮮魚飯', price: 90 },
      { id: 'b7', category: '便當類', name: '梅干扣肉飯', price: 95 },
      { id: 'b8', category: '便當類', name: '每日特餐', price: 95 },
      { id: 'b9', category: '便當類', name: '香酥大雞排飯', price: 95 },
      { id: 'b10', category: '便當類', name: '排骨飯', price: 95 },
      { id: 'b11', category: '便當類', name: '滷排骨飯', price: 95 },
      { id: 'b12', category: '便當類', name: '香煎鯖魚飯', price: 110 },
      { id: 'b13', category: '便當類', name: '香酥大雞腿飯', price: 110 },
      // 單點類
      { id: 's1', category: '單點類', name: '白飯/碗', price: 10 },
      { id: 's2', category: '單點類', name: '時令青菜(小)', price: 10 },
      { id: 's3', category: '單點類', name: '時令青菜(大)', price: 30 },
      { id: 's4', category: '單點類', name: '香腸/2片', price: 10 },
      { id: 's5', category: '單點類', name: '鹹魚/塊', price: 10 },
      { id: 's6', category: '單點類', name: '蝦捲/條', price: 20 },
      { id: 's7', category: '單點類', name: '蒜泥白肉(2片)', price: 30 },
      { id: 's8', category: '單點類', name: '蒜泥白肉(4片)', price: 60 },
      { id: 's9', category: '單點類', name: '咔啦雞', price: 55 },
      { id: 's10', category: '單點類', name: '滷棒腿', price: 55 },
      { id: 's11', category: '單點類', name: '鮮魚', price: 55 },
      { id: 's12', category: '單點類', name: '單點排骨', price: 60 },
      { id: 's13', category: '單點類', name: '單點滷排骨', price: 60 },
      { id: 's14', category: '單點類', name: '梅干扣肉', price: 60 },
      { id: 's15', category: '單點類', name: '香煎鯖魚', price: 65 },
      { id: 's16', category: '單點類', name: '香酥大雞排', price: 65 },
      { id: 's17', category: '單點類', name: '香酥大雞腿', price: 70 },
    ];

    lucide.createIcons();

    // 手機版 Tab 切換邏輯
    const navOrderBtn = document.getElementById('nav-order-btn');
    const navListBtn = document.getElementById('nav-list-btn');
    const sectionOrder = document.getElementById('tab-order-section');
    const sectionList = document.getElementById('tab-list-section');

    const switchTab = (tab) => {
      if (window.innerWidth >= 1024) return; // 桌機不執行
      if (tab === 'order') {
        sectionOrder.classList.remove('hidden');
        sectionList.classList.add('hidden');
        // UI 切換
        navOrderBtn.classList.replace('text-stone-400', 'text-emerald-700');
        navOrderBtn.classList.replace('border-transparent', 'border-emerald-600');
        navOrderBtn.classList.add('bg-emerald-50');
        
        navListBtn.classList.replace('text-emerald-700', 'text-stone-400');
        navListBtn.classList.replace('border-emerald-600', 'border-transparent');
        navListBtn.classList.remove('bg-emerald-50');
      } else {
        sectionList.classList.remove('hidden');
        sectionOrder.classList.add('hidden');
        // UI 切換
        navListBtn.classList.replace('text-stone-400', 'text-emerald-700');
        navListBtn.classList.replace('border-transparent', 'border-emerald-600');
        navListBtn.classList.add('bg-emerald-50');
        
        navOrderBtn.classList.replace('text-emerald-700', 'text-stone-400');
        navOrderBtn.classList.replace('border-emerald-600', 'border-transparent');
        navOrderBtn.classList.remove('bg-emerald-50');
      }
    };

    navOrderBtn.addEventListener('click', () => switchTab('order'));
    navListBtn.addEventListener('click', () => switchTab('list'));

    // 資料庫集合名稱：固定名稱，實現跨天留存手動清除
    const getCollectionName = () => `dongying_orders_live`;

    const updateTime = () => {
      const now = new Date();
      document.getElementById('current-time').textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
      
      const isPast = now.getHours() >= 10;
      state.isPastCutoff = isPast;
      
      const clockContainer = document.getElementById('clock-container');
      const timeWarning = document.getElementById('time-warning');
      
      if (isPast) {
        clockContainer.classList.add('scale-105', 'font-bold', 'bg-black/30');
        timeWarning.classList.remove('hidden');
      } else {
        clockContainer.classList.remove('scale-105', 'font-bold', 'bg-black/30');
        timeWarning.classList.add('hidden');
      }
    };
    
    document.getElementById('today-date').textContent = `📅 ${new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })}`;
    setInterval(updateTime, 1000);
    updateTime();

    let modalConfirmCallback = null;
    const modal = document.getElementById('custom-modal');
    
    const showModal = (title, message, type = 'info', onConfirm = null) => {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-message').textContent = message;
      
      const header = document.getElementById('modal-header');
      const icon = document.getElementById('modal-icon');
      const cancelBtn = document.getElementById('modal-cancel-btn');
      const confirmBtn = document.getElementById('modal-confirm-btn');
      
      header.className = 'p-5 flex items-center gap-3 text-white';
      confirmBtn.className = 'px-6 py-2.5 rounded-lg font-bold text-white shadow-md transition-colors';
      
      if (type === 'error') {
        header.classList.add('bg-stone-800');
        confirmBtn.classList.add('bg-stone-800', 'hover:bg-stone-900'); icon.setAttribute('data-lucide', 'alert-octagon');
      } else if (type === 'warning') {
        header.classList.add('bg-amber-500');
        confirmBtn.classList.add('bg-amber-600', 'hover:bg-amber-700'); icon.setAttribute('data-lucide', 'alert-triangle');
      } else if (type === 'success') {
        header.classList.add('bg-emerald-600');
        confirmBtn.classList.add('bg-emerald-700', 'hover:bg-emerald-800'); icon.setAttribute('data-lucide', 'check-circle');
      } else if (type === 'confirm') {
        header.classList.add('bg-red-600');
        confirmBtn.classList.add('bg-red-700', 'hover:bg-red-800'); icon.setAttribute('data-lucide', 'help-circle');
      } else {
        header.classList.add('bg-emerald-600'); confirmBtn.classList.add('bg-emerald-700', 'hover:bg-emerald-800'); icon.setAttribute('data-lucide', 'info');
      }
      
      if (type === 'confirm') cancelBtn.classList.remove('hidden');
      else cancelBtn.classList.add('hidden');
      
      lucide.createIcons();
      modalConfirmCallback = onConfirm;
      modal.classList.remove('hidden');
    };

    const closeModal = () => { modal.classList.add('hidden'); modalConfirmCallback = null; };
    document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
    document.getElementById('modal-confirm-btn').addEventListener('click', () => {
      if (modalConfirmCallback) modalConfirmCallback();
      closeModal();
    });

    const menuContainer = document.getElementById('menu-container');
    menuContainer.innerHTML = MENU_DATA.map(item => {
      const catColor = item.category === '單點類' ? 'text-amber-600' : 'text-stone-500';
      return `
      <button onclick="addToCart('${item.id}')" class="flex flex-col items-center justify-center p-4 border border-stone-200 rounded-xl hover:border-emerald-500 hover:shadow-md hover:bg-emerald-50 active:scale-95 transition-all text-sm text-left relative overflow-hidden group bg-white shadow-sm">
        <span class="text-xs font-bold mb-1.5 ${catColor}">${item.category}</span>
        <span class="font-bold text-stone-800 text-[15px] text-center leading-tight">${item.name}</span>
        <span class="text-emerald-700 font-bold mt-2 text-base">$${item.price}</span>
        <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
          <i data-lucide="plus-circle" class="w-5 h-5 text-emerald-600"></i>
        </div>
      </button>
    `}).join('');
    lucide.createIcons();

    window.addToCart = (menuId) => {
      const menuItem = MENU_DATA.find(m => m.id === menuId);
      const existingItem = state.cart.find(item => item.id === menuId && item.remark === '');
      if (existingItem) {
        existingItem.qty += 1;
      } else {
        state.cart.push({ ...menuItem, cartId: Date.now().toString(), qty: 1, remark: '' });
      }
      renderCart();
    };

    window.updateCartQty = (cartId, delta) => {
      const item = state.cart.find(i => i.cartId === cartId);
      if (item) {
        item.qty += delta;
        if (item.qty < 1) item.qty = 1;
        renderCart();
      }
    };

    window.removeFromCart = (cartId) => {
      state.cart = state.cart.filter(i => i.cartId !== cartId);
      renderCart();
    };

    window.updateRemark = (cartId, value) => {
      const item = state.cart.find(i => i.cartId === cartId);
      if (item) item.remark = value;
    };

    const renderCart = () => {
      const container = document.getElementById('cart-items-container');
      const totalSpan = document.getElementById('cart-total');
      
      if (state.cart.length === 0) {
        container.innerHTML = '<p class="text-stone-400 text-sm text-center py-6">尚未選擇任何餐點</p>';
        totalSpan.textContent = '0';
        return;
      }

      let total = 0;
      container.innerHTML = state.cart.map(item => {
        total += item.price * item.qty;
        return `
          <div class="bg-white p-3.5 rounded-xl shadow-sm border border-stone-200 flex flex-col sm:flex-row gap-3 items-start sm:items-center relative">
            <div class="flex-1 w-full">
              <div class="font-bold text-stone-800 text-base">${item.name} <span class="text-emerald-700 ml-1 text-sm">$${item.price}</span></div>
              <input 
                type="text"
                placeholder="備註 (例: 飯少)"
                value="${item.remark}"
                onchange="updateRemark('${item.cartId}', this.value)"
                class="mt-2 w-full text-sm p-2 border border-stone-200 rounded-lg focus:ring-2 focus:ring-emerald-200 focus:border-emerald-400 outline-none bg-stone-50"
              />
            </div>
            <div class="flex items-center gap-3 self-end sm:self-auto bg-stone-50 p-1.5 rounded-lg border border-stone-200">
              <button onclick="updateCartQty('${item.cartId}', -1)" class="p-1.5 bg-white shadow-sm rounded-md hover:bg-stone-200 text-stone-600 active:scale-90 transition-transform"><i data-lucide="minus" class="w-4 h-4"></i></button>
              <span class="w-6 text-center font-bold text-stone-800 text-lg">${item.qty}</span>
              <button onclick="updateCartQty('${item.cartId}', 1)" class="p-1.5 bg-white shadow-sm rounded-md hover:bg-stone-200 text-stone-600 active:scale-90 transition-transform"><i data-lucide="plus" class="w-4 h-4"></i></button>
            </div>
            <button onclick="removeFromCart('${item.cartId}')" class="absolute top-2 right-2 sm:static p-2 text-stone-300 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
          </div>
        `;
      }).join('');
      totalSpan.textContent = total;
      lucide.createIcons();
    };

    signInAnonymously(auth).catch(err => console.error("登入失敗:", err));
    onAuthStateChanged(auth, (user) => {
      state.user = user;
      if (user) {
        const ordersRef = collection(db, 'artifacts', FIREBASE_APP_ID, 'public', 'data', getCollectionName());
        onSnapshot(ordersRef, (snapshot) => {
          const ordersData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          ordersData.sort((a, b) => (a.createdAt?.toMillis() || 0) - (b.createdAt?.toMillis() || 0));
          state.orders = ordersData;
          renderOrdersList();
        }, (error) => {
          console.error("讀取訂單失敗:", error);
        });
      }
    });

    const renderOrdersList = () => {
      const container = document.getElementById('orders-container');
      const count = state.orders.length;
      document.getElementById('orders-count').textContent = count;
      
      // 更新手機版小紅點標記
      const badge = document.getElementById('mobile-badge');
      if (count > 0) {
        badge.textContent = count;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
      
      const grandTotal = state.orders.reduce((sum, order) => sum + order.total, 0);
      document.getElementById('orders-grand-total').textContent = grandTotal;
      
      if (state.orders.length === 0) {
        container.innerHTML = '<div class="text-center py-12"><i data-lucide="clipboard-list" class="w-12 h-12 mx-auto text-stone-200 mb-3"></i><p class="text-stone-400 font-medium">清單空空如也，趕快來點餐吧！</p></div>';
        lucide.createIcons();
        return;
      }

      container.innerHTML = state.orders.map(order => `
        <div class="border border-stone-200 rounded-xl p-4 hover:shadow-md transition-shadow bg-white relative overflow-hidden group">
          <div class="flex justify-between items-center mb-3 border-b border-stone-100 pb-2">
            <span class="font-bold text-emerald-800 text-lg flex items-center gap-2"><i data-lucide="user" class="w-4 h-4"></i> ${order.userName}</span>
            <div class="flex gap-2 relative z-10">
              <button onclick="editOrder('${order.id}')" class="p-2 text-stone-400 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition-colors bg-stone-50" title="修改"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
              <button onclick="deleteOrder('${order.id}')" class="p-2 text-stone-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors bg-stone-50" title="刪除"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
          </div>
          <ul class="text-[15px] space-y-2 mb-3">
            ${order.items.map(item => `
              <li class="flex justify-between items-start text-stone-700">
                <span class="flex-1 pr-2">
                  <span class="font-bold text-stone-800">${item.name}</span> 
                  <span class="text-emerald-600 font-bold ml-1">x${item.qty}</span> 
                  ${item.remark ? `<span class="block text-amber-600 bg-amber-50 px-2 py-0.5 rounded text-xs mt-1 w-fit border border-amber-100">備註: ${item.remark}</span>` : ''}
                </span>
                <span class="text-stone-500 font-medium whitespace-nowrap">$${item.price * item.qty}</span>
              </li>
            `).join('')}
          </ul>
          <div class="text-right font-black text-stone-800 border-t border-stone-100 pt-3 mt-1 bg-stone-50/50 -mx-4 -mb-4 px-4 pb-4">
            小計: <span class="text-amber-600 text-xl ml-1">$${order.total}</span>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    };

    document.getElementById('submit-order-btn').addEventListener('click', () => {
      const userNameInput = document.getElementById('user-name-input');
      const userName = userNameInput.value.trim();
      
      if (!userName) return showModal('哎呀！忘了填名字', '請輸入點餐者姓名，這樣才知道便當是誰的喔！', 'warning');
      if (state.cart.length === 0) return showModal('購物車是空的', '請至少從菜單中選擇一項餐點！', 'warning');

      const executeSubmit = async () => {
        try {
          // 在送出時顯示載入狀態
          const btn = document.getElementById('submit-order-btn');
          const originalText = btn.innerHTML;
          btn.innerHTML = '<i data-lucide="loader-2" class="w-6 h-6 animate-spin"></i> 處理中...';
          lucide.createIcons();
          
          const ordersRef = collection(db, 'artifacts', FIREBASE_APP_ID, 'public', 'data', getCollectionName());
          const cartTotal = state.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
          
          const orderData = {
            userName: userName,
            items: state.cart,
            total: cartTotal,
            createdAt: serverTimestamp(),
            userId: state.user.uid
          };

          if (state.editingOrderId) {
            await updateDoc(doc(ordersRef, state.editingOrderId), orderData);
            showModal('修改成功', '您的訂單已經更新完畢！', 'success');
          } else {
            await addDoc(ordersRef, orderData);
            showModal('訂餐成功', '太棒了！您的訂單已經成功送出。', 'success');
          }

          userNameInput.value = '';
          state.cart = [];
          cancelEditMode();
          renderCart();
          btn.innerHTML = originalText;
          lucide.createIcons();
          
          // 手機版自動切換到清單頁面看結果
          if (window.innerWidth < 1024) switchTab('list');
          
        } catch (error) {
          console.error("寫入失敗:", error);
          showModal('連線異常', '訂單送出失敗，請檢查網路狀態後重試。', 'error');
        }
      };
      
      if (state.isPastCutoff) {
        showModal('超過截單時間提醒', '目前已經超過 10:00 的訂購時間，強烈建議您送出後，親自與訂餐發起人確認，以免漏單喔！', 'confirm', executeSubmit);
      } else {
        executeSubmit();
      }
    });

    window.editOrder = (orderId) => {
      const order = state.orders.find(o => o.id === orderId);
      if (!order) return;
      
      document.getElementById('user-name-input').value = order.userName;
      state.cart = JSON.parse(JSON.stringify(order.items)); // 深拷貝
      state.editingOrderId = order.id;
      
      document.getElementById('form-title').innerHTML = '<span class="bg-amber-100 text-amber-800 p-1.5 rounded-lg"><i data-lucide="edit-3" class="w-5 h-5"></i></span> 正在修改訂單';
      const btn = document.getElementById('submit-order-btn');
      btn.classList.replace('bg-emerald-700', 'bg-amber-600');
      btn.classList.replace('hover:bg-emerald-800', 'hover:bg-amber-700');
      document.getElementById('submit-btn-text').textContent = '確認更新這筆訂單';
      document.getElementById('cancel-edit-btn').classList.remove('hidden');
      
      renderCart();
      lucide.createIcons();
      
      // 切換回點餐分頁
      if (window.innerWidth < 1024) switchTab('order');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    const cancelEditMode = () => {
      state.editingOrderId = null;
      document.getElementById('form-title').innerHTML = '<span class="bg-emerald-100 text-emerald-700 p-1.5 rounded-lg"><i data-lucide="utensils" class="w-5 h-5"></i></span> 我要點餐';
      const btn = document.getElementById('submit-order-btn');
      btn.classList.replace('bg-amber-600', 'bg-emerald-700');
      btn.classList.replace('hover:bg-amber-700', 'hover:bg-emerald-800');
      document.getElementById('submit-btn-text').textContent = '確認送出訂單';
      document.getElementById('cancel-edit-btn').classList.add('hidden');
      lucide.createIcons();
    };

    document.getElementById('cancel-edit-btn').addEventListener('click', () => {
      document.getElementById('user-name-input').value = '';
      state.cart = [];
      cancelEditMode();
      renderCart();
    });

    window.deleteOrder = (orderId) => {
      showModal('確認刪除', '您確定要取消並刪除這筆訂單嗎？', 'confirm', async () => {
        await deleteDoc(doc(db, 'artifacts', FIREBASE_APP_ID, 'public', 'data', getCollectionName(), orderId));
      });
    };

    document.getElementById('clear-all-btn').addEventListener('click', () => {
      if (state.orders.length === 0) return showModal('提示', '目前沒有任何訂購資料可以清除喔。', 'info');
      
      showModal('危險操作警告！', '確定要徹底清除「所有」的訂購資料嗎？此動作將完全清空資料庫，並且無法復原！建議清除前先複製明細。', 'confirm', () => {
        const ordersRef = collection(db, 'artifacts', FIREBASE_APP_ID, 'public', 'data', getCollectionName());
        state.orders.forEach(async (order) => {
          await deleteDoc(doc(ordersRef, order.id));
        });
        showModal('清除完畢', '所有資料已成功歸零，準備迎接新的一輪訂餐！', 'success');
      });
    });

    document.getElementById('copy-orders-btn').addEventListener('click', () => {
      if (state.orders.length === 0) return showModal('無法複製', '目前還沒有任何訂單可以複製喔！', 'warning');

      const dateStr = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });
      let textToCopy = `🍱 【東瀛池上飯包】訂餐明細 (${dateStr})\n`;
      textToCopy += `========================\n`;
      
      let grandTotal = 0;
      let itemCounts = {};

      state.orders.forEach(order => {
        const itemsText = order.items.map(i => {
          const remarkText = i.remark ? `(${i.remark})` : '';
          const key = `${i.name}${remarkText}`;
          itemCounts[key] = (itemCounts[key] || 0) + i.qty;
          return `${i.name}x${i.qty}${remarkText}`;
        }).join(', ');

        textToCopy += `👤 ${order.userName}: ${itemsText} = $${order.total}\n`;
        grandTotal += order.total;
      });

      textToCopy += `========================\n`;
      textToCopy += `📝 品項總計：\n`;
      
      // 將統計結果排序 (字首排序)
      const sortedItems = Object.keys(itemCounts).sort();
      sortedItems.forEach(name => {
        textToCopy += `▫️ ${name}: ${itemCounts[name]}份\n`;
      });
      
      textToCopy += `------------------------\n`;
      textToCopy += `💰 總共收費金額: $${grandTotal}\n`;

      const textArea = document.createElement("textarea");
      textArea.value = textToCopy;
      textArea.setAttribute('readonly', '');
      textArea.style.position = 'absolute';
      textArea.style.left = '-9999px';
      document.body.appendChild(textArea);
      
      textArea.select();
      textArea.setSelectionRange(0, 99999);
      
      try {
        document.execCommand('copy');
        showModal('複製成功', '訂單明細已完美複製到剪貼簿！現在可以直接貼到 LINE 群組點名囉！', 'success');
      } catch (err) {
        showModal('複製失敗', '您的瀏覽器安全限制較高，請手動選取文字複製。', 'error');
      }
      document.body.removeChild(textArea);
    });
  </script>
</body>
</html>
