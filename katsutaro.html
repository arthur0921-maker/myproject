      .modal-content { margin-top: auto; border-radius: 1.5rem 1.5rem 0 0 !important; animation: slideUp 0.3s ease-out forwards; }

    @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

      { id: 'n4', category: '鍋物與麵食', name: '咖哩海鮮烏龍麵', price: 120 },
      { id: 'n5', category: '鍋物與麵食', name: '炸豬排咖哩烏龍麵', price: 130 },

      // 組合餐
      { id: 'c1', category: '組合餐', name: '和風洋食', price: 129 },
      { id: 'c2', category: '組合餐', name: '輕食熱點', price: 159 },
      { id: 'c3', category: '組合餐', name: '日系享食', price: 149 },
      { id: 'c4', category: '組合餐', name: '組合餐', price: 179 }
    ];

    lucide.createIcons();

    // 獨立集合名稱
    const getCollectionName = () => `katsutaro_orders_live`;

    // 產生分類按鈕
    const categories = ['全部', ...new Set(MENU_DATA.map(i => i.category))];
    const categoryFilters = document.getElementById('category-filters');
    
    const renderCategories = () => {
      categoryFilters.innerHTML = categories.map(cat => {
        const isActive = state.activeCategory === cat;
        const baseClass = "whitespace-nowrap px-4 py-1.5 rounded-full text-sm font-bold transition-colors cursor-pointer border";
        const activeClass = isActive ? "bg-red-700 text-white border-red-600 shadow-md" : "bg-stone-800 text-stone-400 border-stone-600 hover:border-stone-400";
        return `<button onclick="setCategory('${cat}')" class="${baseClass} ${activeClass}">${cat}</button>`;
      }).join('');
    };

    window.setCategory = (cat) => {
      state.activeCategory = cat;
      renderCategories();
      renderMenu();
    };

    // 渲染菜單
    const renderMenu = () => {
      const container = document.getElementById('menu-container');
      const filteredMenu = state.activeCategory === '全部' ? MENU_DATA : MENU_DATA.filter(m => m.category === state.activeCategory);
      
      container.innerHTML = filteredMenu.map(item => {
        return `
        <button onclick="addToCart('${item.id}')" class="flex flex-col items-center justify-center p-4 border border-stone-700 rounded-xl hover:border-red-500 hover:shadow-lg hover:bg-stone-700 active:scale-95 transition-all text-sm text-left relative overflow-hidden group bg-stone-800 shadow-sm">
          <span class="text-xs font-bold mb-1.5 text-stone-500">${item.category}</span>
          <span class="font-bold text-stone-100 text-[15px] text-center leading-tight">${item.name}</span>
          <span class="text-amber-500 font-bold mt-2 text-base">$${item.price}</span>
          <div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">
            <i data-lucide="plus-circle" class="w-5 h-5 text-red-500"></i>
          </div>
        </button>
      `}).join('');
      lucide.createIcons();
    };

    // 購物車邏輯
    window.addToCart = (menuId) => {
      const menuItem = MENU_DATA.find(m => m.id === menuId);
      const existingItem = state.cart.find(item => item.id === menuId && item.remark === '');
      if (existingItem) existingItem.qty += 1;
      else state.cart.push({ ...menuItem, cartId: Date.now().toString(), qty: 1, remark: '' });
      renderCart();
    };

    window.updateCartQty = (cartId, delta) => {
      const item = state.cart.find(i => i.cartId === cartId);
      if (item) {
        item.qty += delta;
        if (item.qty < 1) item.qty = 1;
        renderCart();
      }
    };

    window.removeFromCart = (cartId) => {
      state.cart = state.cart.filter(i => i.cartId !== cartId);
      renderCart();
    };

    window.updateRemark = (cartId, value) => {
      const item = state.cart.find(i => i.cartId === cartId);
      if (item) item.remark = value;
    };

    const checkDeliveryThreshold = (total, elementId, isGlobal = false) => {
      const el = document.getElementById(elementId);
      const diff = 700 - total;
      if (diff > 0) {
        el.className = isGlobal ? "bg-red-900/30 border border-red-800 text-red-300 text-sm p-2 rounded-lg text-center font-bold" : "text-right text-xs font-bold text-red-400";
        el.innerHTML = isGlobal ? `⚠️ 目前全團總額 $${total}，距離外送門檻 <strong class="text-white">還差 $${diff}</strong>` : `距離外送門檻 700 元，還差 $${diff}`;
      } else {
        el.className = isGlobal ? "bg-emerald-900/30 border border-emerald-800 text-emerald-300 text-sm p-2 rounded-lg text-center font-bold" : "text-right text-xs font-bold text-emerald-400";
        el.innerHTML = isGlobal ? `✅ 全團已達外送門檻！` : `✅ 已達 $700 外送門檻！`;
      }
    };

    const renderCart = () => {
      const container = document.getElementById('cart-items-container');
      const totalSpan = document.getElementById('cart-total');
      
      if (state.cart.length === 0) {
        container.innerHTML = '<p class="text-stone-500 text-sm text-center py-6">尚未選擇任何餐點</p>';
        totalSpan.textContent = '0';
        document.getElementById('cart-delivery-status').innerHTML = '';
        return;
      }

      let total = 0;
      container.innerHTML = state.cart.map(item => {
        total += item.price * item.qty;
        return `
          <div class="bg-stone-800 p-3.5 rounded-xl shadow-sm border border-stone-700 flex flex-col sm:flex-row gap-3 items-start sm:items-center relative">
            <div class="flex-1 w-full">
              <div class="font-bold text-stone-100 text-base">${item.name} <span class="text-amber-500 ml-1 text-sm">$${item.price}</span></div>
              <input type="text" placeholder="備註 (例: 飯少)" value="${item.remark}" onchange="updateRemark('${item.cartId}', this.value)"
                class="mt-2 w-full text-sm p-2 border border-stone-600 rounded-lg focus:ring-2 focus:ring-red-900 focus:border-red-600 outline-none bg-stone-900 text-white placeholder-stone-500" />
            </div>
            <div class="flex items-center gap-3 self-end sm:self-auto bg-stone-900 p-1.5 rounded-lg border border-stone-700">
              <button onclick="updateCartQty('${item.cartId}', -1)" class="p-1.5 bg-stone-800 shadow-sm rounded-md hover:bg-stone-700 text-stone-300 active:scale-90 transition-transform"><i data-lucide="minus" class="w-4 h-4"></i></button>
              <span class="w-6 text-center font-bold text-white text-lg">${item.qty}</span>
              <button onclick="updateCartQty('${item.cartId}', 1)" class="p-1.5 bg-stone-800 shadow-sm rounded-md hover:bg-stone-700 text-stone-300 active:scale-90 transition-transform"><i data-lucide="plus" class="w-4 h-4"></i></button>
            </div>
            <button onclick="removeFromCart('${item.cartId}')" class="absolute top-2 right-2 sm:static p-2 text-stone-500 hover:text-red-400 hover:bg-red-900/30 rounded-full transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
          </div>
        `;
      }).join('');
      totalSpan.textContent = total;
      checkDeliveryThreshold(total, 'cart-delivery-status', false);
      lucide.createIcons();
    };

    // Firebase 連線與監聽
    signInAnonymously(auth).catch(err => console.error("登入失敗:", err));
    onAuthStateChanged(auth, (user) => {
      state.user = user;
      if (user) {
        const ordersRef = collection(db, 'artifacts', FIREBASE_APP_ID, 'public', 'data', getCollectionName());
        onSnapshot(ordersRef, (snapshot) => {
          const ordersData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          ordersData.sort((a, b) => (a.createdAt?.toMillis() || 0) - (b.createdAt?.toMillis() || 0));
          state.orders = ordersData;
          renderOrdersList();
        });
      }
    });

    const renderOrdersList = () => {
      const container = document.getElementById('orders-container');
      const count = state.orders.length;
      document.getElementById('orders-count').textContent = count;
      
      const badge = document.getElementById('mobile-badge');
      if (count > 0) { badge.textContent = count; badge.classList.remove('hidden'); } 
      else { badge.classList.add('hidden'); }
      
      const grandTotal = state.orders.reduce((sum, order) => sum + order.total, 0);
      document.getElementById('orders-grand-total').textContent = grandTotal;
      checkDeliveryThreshold(grandTotal, 'global-delivery-status', true);
      
      if (count === 0) {
        container.innerHTML = '<div class="text-center py-12"><i data-lucide="clipboard-list" class="w-12 h-12 mx-auto text-stone-600 mb-3"></i><p class="text-stone-500 font-medium">清單空空如也，趕快來點餐吧！</p></div>';
        lucide.createIcons();
        return;
      }

      container.innerHTML = state.orders.map(order => `
        <div class="border border-stone-700 rounded-xl p-4 hover:shadow-md transition-shadow bg-stone-800 relative overflow-hidden group">
          <div class="flex justify-between items-center mb-3 border-b border-stone-700 pb-2">
            <span class="font-bold text-stone-100 text-lg flex items-center gap-2"><i data-lucide="user" class="w-4 h-4 text-red-400"></i> ${order.userName}</span>
            <div class="flex gap-2 relative z-10">
              <button onclick="editOrder('${order.id}')" class="p-2 text-stone-400 hover:text-amber-400 hover:bg-stone-700 rounded-lg transition-colors bg-stone-900" title="修改"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
              <button onclick="deleteOrder('${order.id}')" class="p-2 text-stone-400 hover:text-red-400 hover:bg-stone-700 rounded-lg transition-colors bg-stone-900" title="刪除"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
          </div>
          <ul class="text-[15px] space-y-2 mb-3">
            ${order.items.map(item => `
              <li class="flex justify-between items-start text-stone-300">
                <span class="flex-1 pr-2">
                  <span class="font-bold text-stone-100">${item.name}</span> 
                  <span class="text-red-400 font-bold ml-1">x${item.qty}</span> 
                  ${item.remark ? `<span class="block text-amber-500 bg-stone-900 px-2 py-0.5 rounded text-xs mt-1 w-fit border border-stone-700">備註: ${item.remark}</span>` : ''}
                </span>
                <span class="text-stone-400 font-medium whitespace-nowrap">$${item.price * item.qty}</span>
              </li>
            `).join('')}
          </ul>
          <div class="text-right font-black text-stone-200 border-t border-stone-700 pt-3 mt-1 bg-stone-900/50 -mx-4 -mb-4 px-4 pb-4">
            小計: <span class="text-amber-500 text-xl ml-1">$${order.total}</span>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    };

    // 安全的送出按鈕操作 (解決先前 Bug)
    document.getElementById('submit-order-btn').addEventListener('click', () => {
      const userNameInput = document.getElementById('user-name-input');
      const userName = userNameInput.value.trim();
      
      if (!userName) return showModal('哎呀！忘了填名字', '請輸入點餐者姓名，這樣才知道餐點是誰的喔！', 'warning');
      if (state.cart.length === 0) return showModal('購物車是空的', '請至少從菜單中選擇一項餐點！', 'warning');

      const executeSubmit = async () => {
        try {
          // 精準定位節點，不破壞結構
          const btnText = document.getElementById('submit-btn-text');
          const btnIcon = document.getElementById('submit-btn-icon');
          const originalText = btnText.textContent;
          
          btnText.textContent = '處理中...';
          btnIcon.setAttribute('data-lucide', 'loader-2');
          btnIcon.classList.add('animate-spin');
          lucide.createIcons();
          
          const ordersRef = collection(db, 'artifacts', FIREBASE_APP_ID, 'public', 'data', getCollectionName());
          const cartTotal = state.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
          
          const orderData = { userName: userName, items: state.cart, total: cartTotal, createdAt: serverTimestamp(), userId: state.user.uid };

          if (state.editingOrderId) {
            await updateDoc(doc(ordersRef, state.editingOrderId), orderData);
            showModal('修改成功', '您的訂單已經更新完畢！', 'success');
          } else {
            await addDoc(ordersRef, orderData);
            showModal('訂餐成功', '太棒了！您的訂單已經成功送出。', 'success');
          }

          userNameInput.value = '';
          state.cart = [];
          cancelEditMode();
          renderCart();
          
          // 復原按鈕狀態
          btnText.textContent = originalText;
          const currentBtnIcon = document.getElementById('submit-btn-icon');
          currentBtnIcon.setAttribute('data-lucide', 'check-circle');
          currentBtnIcon.classList.remove('animate-spin');
          lucide.createIcons();
        
          // 手機版自動切換到清單頁面看結果 
          if (window.innerWidth < 1024) switchTab('list');
        } catch (error) {
          console.error("寫入失敗:", error);
          showModal('連線異常', '訂單送出失敗，請檢查網路狀態後重試。', 'error');
        }
      };
      
      if (state.isPastCutoff) showModal('超過截單時間提醒', '目前已經超過 10:00 的訂購時間，強烈建議您送出後，親自與訂餐發起人確認，以免漏單喔！', 'confirm', executeSubmit);
      else executeSubmit();
    });

    window.editOrder = (orderId) => {
      const order = state.orders.find(o => o.id === orderId);
      if (!order) return;
      
      document.getElementById('user-name-input').value = order.userName;
      state.cart = JSON.parse(JSON.stringify(order.items)); 
      state.editingOrderId = order.id;
      
      document.getElementById('form-title').innerHTML = '<span class="bg-amber-900/50 text-amber-500 p-1.5 rounded-lg"><i data-lucide="edit-3" class="w-5 h-5"></i></span> 正在修改訂單';
      const btn = document.getElementById('submit-order-btn');
      btn.classList.replace('bg-red-700', 'bg-amber-600');
      btn.classList.replace('hover:bg-red-600', 'hover:bg-amber-500');
      
      document.getElementById('submit-btn-text').textContent = '確認更新這筆訂單';
      document.getElementById('submit-btn-icon').setAttribute('data-lucide', 'refresh-cw');
      document.getElementById('cancel-edit-btn').classList.remove('hidden');
      
      renderCart();
      lucide.createIcons();
      if (window.innerWidth < 1024) switchTab('order');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    const cancelEditMode = () => {
      state.editingOrderId = null;
      document.getElementById('form-title').innerHTML = '<span class="bg-red-900/50 text-red-400 p-1.5 rounded-lg"><i data-lucide="utensils" class="w-5 h-5"></i></span> 我要點餐';
      const btn = document.getElementById('submit-order-btn');
      btn.classList.replace('bg-amber-600', 'bg-red-700');
      btn.classList.replace('hover:bg-amber-500', 'hover:bg-red-600');
      
      document.getElementById('submit-btn-text').textContent = '確認送出訂單';
      document.getElementById('submit-btn-icon').setAttribute('data-lucide', 'check-circle');
      document.getElementById('cancel-edit-btn').classList.add('hidden');
      lucide.createIcons();
    };

    document.getElementById('cancel-edit-btn').addEventListener('click', () => {
      document.getElementById('user-name-input').value = '';
      state.cart = [];
      cancelEditMode();
      renderCart();
    });

    window.deleteOrder = (orderId) => {
      showModal('確認刪除', '您確定要取消並刪除這筆訂單嗎？', 'confirm', async () => {
        await deleteDoc(doc(db, 'artifacts', FIREBASE_APP_ID, 'public', 'data', getCollectionName(), orderId));
      });
    };

    document.getElementById('clear-all-btn').addEventListener('click', () => {
      if (state.orders.length === 0) return showModal('提示', '目前沒有任何訂購資料可以清除喔。', 'info');
      showModal('危險操作警告！', '確定要徹底清除「所有」的訂購資料嗎？此動作將完全清空資料庫，並且無法復原！建議清除前先複製明細。', 'confirm', () => {
        const ordersRef = collection(db, 'artifacts', FIREBASE_APP_ID, 'public', 'data', getCollectionName());
        state.orders.forEach(async (order) => { await deleteDoc(doc(ordersRef, order.id)); });
        showModal('清除完畢', '所有資料已成功歸零，準備迎接新的一輪訂餐！', 'success');
      });
    });

    document.getElementById('copy-orders-btn').addEventListener('click', () => {
      if (state.orders.length === 0) return showModal('無法複製', '目前還沒有任何訂單可以複製喔！', 'warning');

      const dateStr = new Date().toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit' });
      let textToCopy = `🍱 【勝太郎日式蛋包飯】訂餐明細 (${dateStr})\n`;
      textToCopy += `========================\n`;
      
      let grandTotal = 0;
      let itemCounts = {};

      state.orders.forEach(order => {
        const itemsText = order.items.map(i => {
          const remarkText = i.remark ? `(${i.remark})` : '';
          const key = `${i.name}${remarkText}`;
          itemCounts[key] = (itemCounts[key] || 0) + i.qty;
          return `${i.name}x${i.qty}${remarkText}`;
        }).join(', ');
        textToCopy += `👤 ${order.userName}: ${itemsText} = $${order.total}\n`;
        grandTotal += order.total;
      });

      textToCopy += `========================\n📝 品項總計：\n`;
      Object.keys(itemCounts).sort().forEach(name => {
        textToCopy += `▫️ ${name}: ${itemCounts[name]}份\n`;
      });
      textToCopy += `------------------------\n`;
      textToCopy += `💰 總共收費金額: $${grandTotal}\n`;
      if (grandTotal >= 700) textToCopy += `✅ (已達外送門檻)\n`;
      else textToCopy += `⚠️ (未達外送門檻，差 $${700 - grandTotal})\n`;

      const textArea = document.createElement("textarea");
      textArea.value = textToCopy;
      textArea.setAttribute('readonly', '');
      textArea.style.position = 'absolute'; textArea.style.left = '-9999px';
      document.body.appendChild(textArea);
      textArea.select(); textArea.setSelectionRange(0, 99999);
      
      try { document.execCommand('copy'); showModal('複製成功', '訂單明細已完美複製到剪貼簿！', 'success'); } 
      catch (err) { showModal('複製失敗', '請手動選取文字複製。', 'error'); }
      document.body.removeChild(textArea);
    });

    // 介面與時間輔助函數
    const navOrderBtn = document.getElementById('nav-order-btn');
    const navListBtn = document.getElementById('nav-list-btn');
    const sectionOrder = document.getElementById('tab-order-section');
    const sectionList = document.getElementById('tab-list-section');

    const switchTab = (tab) => {
      if (window.innerWidth >= 1024) return;
      if (tab === 'order') {
        sectionOrder.classList.remove('hidden'); sectionList.classList.add('hidden');
        navOrderBtn.classList.replace('text-stone-500', 'text-red-500'); navOrderBtn.classList.replace('border-transparent', 'border-red-600'); navOrderBtn.classList.add('bg-stone-900');
        navListBtn.classList.replace('text-red-500', 'text-stone-500'); navListBtn.classList.replace('border-red-600', 'border-transparent'); navListBtn.classList.remove('bg-stone-900');
      } else {
        sectionList.classList.remove('hidden'); sectionOrder.classList.add('hidden');
        navListBtn.classList.replace('text-stone-500', 'text-red-500'); navListBtn.classList.replace('border-transparent', 'border-red-600'); navListBtn.classList.add('bg-stone-900');
        navOrderBtn.classList.replace('text-red-500', 'text-stone-500'); navOrderBtn.classList.replace('border-red-600', 'border-transparent'); navOrderBtn.classList.remove('bg-stone-900');
      }
    };
    navOrderBtn.addEventListener('click', () => switchTab('order'));
    navListBtn.addEventListener('click', () => switchTab('list'));

    const updateTime = () => {
      const now = new Date();
      document.getElementById('current-time').textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
      state.isPastCutoff = now.getHours() >= 10;
      const clockContainer = document.getElementById('clock-container');
      const timeWarning = document.getElementById('time-warning');
      if (state.isPastCutoff) { clockContainer.classList.add('scale-105', 'font-bold', 'bg-black/60'); timeWarning.classList.remove('hidden'); } 
      else { clockContainer.classList.remove('scale-105', 'font-bold', 'bg-black/60'); timeWarning.classList.add('hidden'); }
    };
    document.getElementById('today-date').textContent = `📅 ${new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })}`;
    setInterval(updateTime, 1000); updateTime();

    let modalConfirmCallback = null;
    const modal = document.getElementById('custom-modal');
    const showModal = (title, message, type = 'info', onConfirm = null) => {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-message').textContent = message;
      const header = document.getElementById('modal-header');
      const icon = document.getElementById('modal-icon');
      const cancelBtn = document.getElementById('modal-cancel-btn');
      const confirmBtn = document.getElementById('modal-confirm-btn');
      
      header.className = 'p-5 flex items-center gap-3 text-white';
      confirmBtn.className = 'px-6 py-2.5 rounded-lg font-bold text-white shadow-md transition-colors';
      
      if (type === 'error') { header.classList.add('bg-stone-950'); confirmBtn.classList.add('bg-stone-700', 'hover:bg-stone-600'); icon.setAttribute('data-lucide', 'alert-octagon'); } 
      else if (type === 'warning') { header.classList.add('bg-amber-600'); confirmBtn.classList.add('bg-amber-700', 'hover:bg-amber-600'); icon.setAttribute('data-lucide', 'alert-triangle'); } 
      else if (type === 'success') { header.classList.add('bg-emerald-700'); confirmBtn.classList.add('bg-emerald-600', 'hover:bg-emerald-500'); icon.setAttribute('data-lucide', 'check-circle'); } 
      else if (type === 'confirm') { header.classList.add('bg-red-800'); confirmBtn.classList.add('bg-red-700', 'hover:bg-red-600'); icon.setAttribute('data-lucide', 'help-circle'); } 
      else { header.classList.add('bg-stone-700'); confirmBtn.classList.add('bg-stone-600', 'hover:bg-stone-500'); icon.setAttribute('data-lucide', 'info'); }
      
      if (type === 'confirm') cancelBtn.classList.remove('hidden'); else cancelBtn.classList.add('hidden');
      lucide.createIcons();
      modalConfirmCallback = onConfirm; modal.classList.remove('hidden');
    };
    const closeModal = () => { modal.classList.add('hidden'); modalConfirmCallback = null; };
    document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
    document.getElementById('modal-confirm-btn').addEventListener('click', () => { if (modalConfirmCallback) modalConfirmCallback(); closeModal(); });

    // 初始化執行
    renderCategories();
    renderMenu();
  </script>
</body>
</html>
