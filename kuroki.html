<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>黑木燒肉飯 訂餐系統 V1.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, 'LiHei Pro', '微軟正黑體', sans-serif; background-color: #1a1a1a; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #2d2d2d; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #facc15; }
    
    /* 彈出視窗動畫 */
    .modal-overlay { animation: fadeIn 0.2s ease-out forwards; }
    .modal-content { animation: scaleIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* 黑木專屬風格 */
    .bg-kuroki-dark { background-color: #2d2d2d; }
    .text-kuroki-yellow { color: #facc15; }
    .border-kuroki-yellow { border-color: #facc15; }
    .btn-kuroki { background-color: #facc15; color: #1a1a1a; }
    .btn-kuroki:hover { background-color: #eab308; }
  </style>
</head>
<body class="text-slate-200 pb-20 min-h-screen">

  <header class="bg-black text-white p-4 shadow-xl border-b-2 border-yellow-500 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-2">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-yellow-500 rounded-full flex items-center justify-center text-black font-bold text-xl border-2 border-yellow-200 shadow-sm">黑</div>
        <h1 class="text-2xl font-bold tracking-wider">黑木燒肉飯 <span class="text-sm font-normal text-yellow-500/80">線上訂餐 V1.0</span></h1>
      </div>
      
      <div id="clock-container" class="flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/10 text-yellow-100 transition-all duration-300">
        <i data-lucide="clock" class="w-5 h-5"></i>
        <span id="current-time" class="tracking-widest font-mono text-lg">--:--:--</span>
        <span id="time-warning" class="hidden text-xs ml-1 bg-red-600 text-white px-1.5 py-0.5 rounded animate-pulse font-bold">10:00 截止</span>
      </div>
    </div>
  </header>

  <div class="w-full text-center py-1 bg-yellow-500 text-black font-bold text-xs shadow-inner">
    炭火の風味 • 精緻套餐專賣
  </div>

  <main class="max-w-6xl mx-auto p-4 mt-4">
    <!-- 店家資訊卡 -->
    <div class="bg-kuroki-dark rounded-xl shadow-lg p-5 mb-6 border-l-4 border-yellow-500 flex flex-col md:flex-row gap-4 justify-between items-start md:items-center">
      <div>
        <h2 id="today-date" class="text-lg font-bold text-yellow-500 mb-2">📅 載入中...</h2>
        <div class="flex flex-col gap-1 text-sm text-slate-300">
          <div class="flex items-center gap-2">
            <i data-lucide="phone" class="w-4 h-4 text-yellow-500"></i> 
            <a href="tel:0289819109" class="hover:text-yellow-400">02-8981-9109</a> / <a href="tel:0289819113" class="hover:text-yellow-400">02-8981-9113</a>
          </div>
          <a href="https://www.google.com/maps/search/?api=1&query=新北市三重區溪尾街213號" target="_blank" rel="noopener noreferrer" class="flex items-center gap-2 hover:text-yellow-400 w-fit">
            <i data-lucide="map-pin" class="w-4 h-4 text-yellow-500"></i> 新北市三重區溪尾街213號 (三重溪尾店)
          </a>
        </div>
      </div>
      <div class="text-sm bg-black/40 text-yellow-100/90 p-3 rounded-lg border border-yellow-500/30">
        <p>💡 點餐提醒：訂單採手動清除，可跨日預約。</p>
        <p>💡 每日截單：<strong class="text-yellow-500 text-base">10:00</strong></p>
        <p class="text-xs text-slate-400 mt-1">* 若需大量訂購請提前電話確認</p>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      
      <!-- 左側：點餐區 -->
      <div class="lg:col-span-7 space-y-6">
        <div class="bg-kuroki-dark rounded-xl shadow-lg p-5 border border-slate-700">
          <h3 id="form-title" class="text-xl font-bold text-white mb-4 flex items-center gap-2 border-b pb-2 border-slate-700">
            <span class="bg-yellow-500 text-black p-1 rounded"><i data-lucide="plus" class="w-5 h-5"></i></span> 
            新增訂單
          </h3>
          
          <div class="mb-6">
            <label class="block text-sm font-bold text-slate-300 mb-1">點餐者姓名 <span class="text-yellow-500">*</span></label>
            <input 
              type="text" 
              id="user-name-input"
              placeholder="請輸入姓名 (例如: 小明)"
              class="w-full p-3 bg-black border border-slate-600 rounded-lg text-white focus:ring-2 focus:ring-yellow-500 focus:border-yellow-500 outline-none transition"
            >
          </div>

          <div class="mb-6">
            <label class="block text-sm font-bold text-slate-300 mb-2">選擇餐點 (點擊加入)</label>
            <div id="menu-container" class="grid grid-cols-2 sm:grid-cols-3 gap-3">
              <!-- JS 動態生成 -->
            </div>
          </div>

          <!-- 購物車清單 -->
          <div class="bg-black/30 p-4 rounded-lg border border-slate-700">
            <h4 class="font-bold text-yellow-500 mb-3 flex items-center gap-2">
               <i data-lucide="shopping-cart" class="w-5 h-5"></i> 點購清單
            </h4>
            
            <div id="cart-items-container" class="space-y-3">
              <p class="text-slate-500 text-sm text-center py-4">尚未選擇餐點</p>
            </div>
            
            <div class="flex justify-between items-center pt-3 border-t border-slate-700 mt-3">
              <span class="font-bold text-slate-400">本筆合計</span>
              <span class="text-2xl font-bold text-yellow-500">$<span id="cart-total">0</span></span>
            </div>
          </div>

          <button 
            id="submit-order-btn"
            class="w-full mt-6 btn-kuroki font-bold text-lg py-3 rounded-lg shadow-md transition flex justify-center items-center gap-2"
          >
            <i data-lucide="check-circle" class="w-5 h-5"></i>
            <span id="submit-btn-text">確認送出訂單</span>
          </button>
          
          <button 
             id="cancel-edit-btn"
            class="hidden w-full mt-2 text-slate-400 text-sm hover:text-yellow-500 hover:underline py-2"
          >
            取消修改，回到新增模式
          </button>
        </div>
      </div>

      <!-- 右側：已訂購列表 -->
      <div class="lg:col-span-5">
        <div class="bg-kuroki-dark rounded-xl shadow-lg p-5 sticky top-24 border border-slate-700">
          <div class="flex justify-between items-center mb-4 border-b pb-2 border-slate-700">
            <h3 class="text-xl font-bold text-white">今日已點 (<span id="orders-count">0</span>)</h3>
            <button 
              id="clear-all-btn"
              class="text-xs bg-red-900/40 text-red-400 hover:bg-red-600 hover:text-white px-3 py-1.5 rounded-full font-bold flex items-center gap-1 transition"
            >
              <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> 清除清單
            </button>
          </div>

          <div id="orders-container" class="max-h-[450px] overflow-y-auto pr-1 space-y-3 custom-scrollbar">
            <p class="text-slate-500 text-center py-10">資料載入中...</p>
          </div>

          <div class="flex justify-between items-center mt-4 pt-4 border-t-2 border-slate-700">
            <span class="text-lg font-bold text-slate-300">總結算金額</span>
            <span class="text-3xl font-bold text-yellow-500">$<span id="orders-grand-total">0</span></span>
          </div>

          <button 
            id="copy-orders-btn"
            class="w-full mt-4 bg-green-700 hover:bg-green-600 text-white font-bold py-2.5 rounded-lg shadow transition flex justify-center items-center gap-2"
          >
            <i data-lucide="copy" class="w-4 h-4"></i> 一鍵複製傳 LINE
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- 彈窗組件 -->
  <div id="custom-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/80 p-4 modal-overlay">
    <div class="bg-kuroki-dark rounded-xl shadow-2xl w-full max-w-sm overflow-hidden modal-content border border-slate-700">
      <div id="modal-header" class="p-4 flex items-center gap-3 text-black bg-yellow-500">
        <i id="modal-icon" data-lucide="info" class="w-6 h-6"></i>
        <h3 id="modal-title" class="font-bold text-lg">提示</h3>
      </div>
      <div id="modal-message" class="p-6 text-slate-200 text-center font-medium leading-relaxed">
        訊息內容
      </div>
      <div class="p-4 bg-black/20 flex justify-end gap-3 border-t border-slate-700">
        <button id="modal-cancel-btn" class="hidden px-4 py-2 text-slate-400 hover:bg-slate-700 rounded font-semibold transition">取消</button>
        <button id="modal-confirm-btn" class="px-6 py-2 rounded font-bold text-black shadow transition bg-yellow-500 hover:bg-yellow-400">確定</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    
    // --- 配置區 ---
    const firebaseConfig = {
      apiKey: "AIzaSyBnWJzwGs7v0y-4TZBak1gNbDSzZp601_k",
      authDomain: "myorder-86db9.firebaseapp.com",
      projectId: "myorder-86db9",
      storageBucket: "myorder-86db9.firebasestorage.app",
      messagingSenderId: "472751421979",
      appId: "1:472751421979:web:a286c3bc4ad419ed1f16be",
      measurementId: "G-ZNRJJ4JQPH"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const FIREBASE_APP_ID = "myorder-86db9";
    
    // 固定的資料表名稱，支援跨日訂單
    const COLLECTION_NAME = "kuroki_active_orders";

    const state = {
      user: null,
      orders: [],
      cart: [],
      editingOrderId: null,
      isPastCutoff: false
    };

    const MENU_DATA = [
      { id: 'k1', category: '精緻套餐', name: '烤雞腿飯', price: 120 },
      { id: 'k2', category: '精緻套餐', name: '香酥雞腿飯', price: 120 },
      { id: 'k3', category: '精緻套餐', name: '鱈魚排飯', price: 120 },
      { id: 'k4', category: '精緻套餐', name: '炭烤燒肉飯', price: 110 },
      { id: 'k5', category: '精緻套餐', name: '脆皮燒肉飯', price: 110 },
      { id: 'k6', category: '精緻套餐', name: '焢肉飯', price: 110 },
      { id: 'k7', category: '精緻套餐', name: '排骨飯', price: 110 },
      { id: 'k8', category: '精緻套餐', name: '雞排飯', price: 110 },
      { id: 'k9', category: '精緻套餐', name: '黑胡椒豬排飯', price: 100 },
      { id: 'k10', category: '精緻套餐', name: '浦燒鯛魚飯', price: 100 },
      { id: 'k11', category: '精緻套餐', name: '咔啦腿排飯', price: 100 },
    ];

    lucide.createIcons();

    // 更新時間與截止檢查
    const updateTime = () => {
      const now = new Date();
      document.getElementById('current-time').textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
      
      const isPast = now.getHours() >= 10;
      state.isPastCutoff = isPast;
      
      const clockContainer = document.getElementById('clock-container');
      const timeWarning = document.getElementById('time-warning');
      
      if (isPast) {
        clockContainer.classList.add('bg-red-900/40', 'border', 'border-red-500');
        timeWarning.classList.remove('hidden');
      } else {
        clockContainer.classList.remove('bg-red-900/40', 'border', 'border-red-500');
        timeWarning.classList.add('hidden');
      }
    };
    
    document.getElementById('today-date').textContent = `📅 ${new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })}`;
    setInterval(updateTime, 1000);
    updateTime();

    // 彈窗功能
    let modalConfirmCallback = null;
    const modal = document.getElementById('custom-modal');
    
    const showModal = (title, message, type = 'info', onConfirm = null) => {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-message').textContent = message;
      
      const header = document.getElementById('modal-header');
      const icon = document.getElementById('modal-icon');
      const cancelBtn = document.getElementById('modal-cancel-btn');
      const confirmBtn = document.getElementById('modal-confirm-btn');
      
      header.className = 'p-4 flex items-center gap-3 text-black';
      confirmBtn.className = 'px-6 py-2 rounded font-bold text-black shadow transition';
      
      if (type === 'error' || type === 'confirm') {
        header.classList.add('bg-red-500');
        confirmBtn.classList.add('bg-red-600', 'text-white', 'hover:bg-red-700'); 
        icon.setAttribute('data-lucide', type === 'confirm' ? 'help-circle' : 'alert-circle');
      } else if (type === 'success') {
        header.classList.add('bg-green-500');
        confirmBtn.classList.add('bg-green-600', 'text-white', 'hover:bg-green-700'); 
        icon.setAttribute('data-lucide', 'check-circle');
      } else {
        header.classList.add('bg-yellow-500'); 
        confirmBtn.classList.add('bg-yellow-600', 'hover:bg-yellow-700'); 
        icon.setAttribute('data-lucide', 'info');
      }
      
      if (type === 'confirm') cancelBtn.classList.remove('hidden');
      else cancelBtn.classList.add('hidden');
      
      lucide.createIcons();
      modalConfirmCallback = onConfirm;
      modal.classList.remove('hidden');
    };

    const closeModal = () => { modal.classList.add('hidden'); modalConfirmCallback = null; };
    document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
    document.getElementById('modal-confirm-btn').addEventListener('click', () => {
      if (modalConfirmCallback) modalConfirmCallback();
      closeModal();
    });

    // 生成菜單
    const menuContainer = document.getElementById('menu-container');
    menuContainer.innerHTML = MENU_DATA.map(item => `
      <button onclick="addToCart('${item.id}')" class="flex flex-col items-center justify-center p-3 border border-slate-700 rounded-lg hover:border-yellow-500 hover:bg-yellow-500/10 active:bg-yellow-500/20 transition text-sm text-left relative overflow-hidden group bg-black/40">
        <span class="text-xs font-bold mb-1 text-slate-500">${item.category}</span>
        <span class="font-bold text-slate-200">${item.name}</span>
        <span class="text-yellow-500 font-semibold mt-1">$${item.price}</span>
        <div class="absolute inset-0 bg-yellow-500/10 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
          <i data-lucide="plus" class="text-yellow-500"></i>
        </div>
      </button>
    `).join('');
    lucide.createIcons();

    // 購物車邏輯
    window.addToCart = (menuId) => {
      const menuItem = MENU_DATA.find(m => m.id === menuId);
      const existingItem = state.cart.find(item => item.id === menuId && item.remark === '');
      if (existingItem) {
        existingItem.qty += 1;
      } else {
        state.cart.push({ ...menuItem, cartId: Date.now().toString(), qty: 1, remark: '' });
      }
      renderCart();
    };

    window.updateCartQty = (cartId, delta) => {
      const item = state.cart.find(i => i.cartId === cartId);
      if (item) {
        item.qty += delta;
        if (item.qty < 1) item.qty = 1;
        renderCart();
      }
    };

    window.removeFromCart = (cartId) => {
      state.cart = state.cart.filter(i => i.cartId !== cartId);
      renderCart();
    };

    window.updateRemark = (cartId, value) => {
      const item = state.cart.find(i => i.cartId === cartId);
      if (item) item.remark = value;
    };

    const renderCart = () => {
      const container = document.getElementById('cart-items-container');
      const totalSpan = document.getElementById('cart-total');
      
      if (state.cart.length === 0) {
        container.innerHTML = '<p class="text-slate-500 text-sm text-center py-4">尚未選擇餐點</p>';
        totalSpan.textContent = '0';
        return;
      }

      let total = 0;
      container.innerHTML = state.cart.map(item => {
        total += item.price * item.qty;
        return `
          <div class="bg-black/40 p-3 rounded shadow-sm border border-slate-700 flex flex-col sm:flex-row gap-3 items-start sm:items-center">
            <div class="flex-1 w-full">
              <div class="font-bold text-slate-200">${item.name} <span class="text-yellow-500 text-sm">$${item.price}</span></div>
              <input 
                type="text"
                placeholder="備註 (例: 不要加辣、飯少)"
                value="${item.remark}"
                onchange="updateRemark('${item.cartId}', this.value)"
                class="mt-1 w-full text-sm p-1.5 bg-black border border-slate-700 rounded text-slate-300 focus:ring-1 focus:ring-yellow-500 outline-none"
              />
            </div>
            <div class="flex items-center gap-2 self-end sm:self-auto">
              <button onclick="updateCartQty('${item.cartId}', -1)" class="p-1 bg-slate-800 rounded hover:bg-slate-700 text-slate-300"><i data-lucide="minus" class="w-4 h-4"></i></button>
              <span class="w-6 text-center font-semibold text-slate-200">${item.qty}</span>
              <button onclick="updateCartQty('${item.cartId}', 1)" class="p-1 bg-slate-800 rounded hover:bg-slate-700 text-slate-300"><i data-lucide="plus" class="w-4 h-4"></i></button>
              <button onclick="removeFromCart('${item.cartId}')" class="p-1.5 text-slate-500 hover:text-red-500 hover:bg-red-500/10 rounded ml-2 transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
          </div>
        `;
      }).join('');
      totalSpan.textContent = total;
      lucide.createIcons();
    };

    // Firebase 數據同步
    signInAnonymously(auth).catch(err => console.error("登入失敗:", err));
    onAuthStateChanged(auth, (user) => {
      state.user = user;
      if (user) {
        const ordersRef = collection(db, 'artifacts', FIREBASE_APP_ID, 'public', 'data', COLLECTION_NAME);
        onSnapshot(ordersRef, (snapshot) => {
          const ordersData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          ordersData.sort((a, b) => (a.createdAt?.toMillis() || 0) - (b.createdAt?.toMillis() || 0));
          state.orders = ordersData;
          renderOrdersList();
        }, (error) => {
          console.error("讀取訂單失敗:", error);
        });
      }
    });

    const renderOrdersList = () => {
      const container = document.getElementById('orders-container');
      document.getElementById('orders-count').textContent = state.orders.length;
      
      const grandTotal = state.orders.reduce((sum, order) => sum + order.total, 0);
      document.getElementById('orders-grand-total').textContent = grandTotal;
      
      if (state.orders.length === 0) {
        container.innerHTML = '<p class="text-slate-500 text-center py-10">目前尚無訂單</p>';
        return;
      }

      container.innerHTML = state.orders.map(order => `
        <div class="border border-slate-700 rounded-lg p-3 hover:shadow-md transition bg-black/20 relative overflow-hidden">
          <div class="flex justify-between items-center mb-2">
            <span class="font-bold text-yellow-500 text-lg">👤 ${order.userName}</span>
            <div class="flex gap-1 relative z-10">
              <button onclick="editOrder('${order.id}')" class="p-1.5 text-slate-500 hover:text-yellow-500 hover:bg-yellow-500/10 rounded transition" title="修改"><i data-lucide="edit" class="w-4 h-4"></i></button>
              <button onclick="deleteOrder('${order.id}')" class="p-1.5 text-slate-500 hover:text-red-500 hover:bg-red-500/10 rounded transition" title="刪除"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
          </div>
          <ul class="text-sm space-y-1 mb-2">
            ${order.items.map(item => `
              <li class="flex justify-between text-slate-300">
                <span>- ${item.name} <span class="text-yellow-500 font-bold">x${item.qty}</span> ${item.remark ?
                `<span class="text-orange-400 bg-orange-950/50 px-1 rounded text-xs ml-1">${item.remark}</span>` : ''}</span>
                <span class="text-slate-500">$${item.price * item.qty}</span>
              </li>
            `).join('')}
          </ul>
          <div class="text-right font-bold text-slate-200 border-t border-slate-700 pt-2 mt-2">
            小計: <span class="text-yellow-500">$${order.total}</span>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    };

    // 送出訂單
    document.getElementById('submit-order-btn').addEventListener('click', () => {
      const userNameInput = document.getElementById('user-name-input');
      const userName = userNameInput.value.trim();
      
      if (!userName) return showModal('提示', '請輸入點餐者姓名！', 'warning');
      if (state.cart.length === 0) return showModal('提示', '請至少選擇一項餐點！', 'warning');

      const executeSubmit = async () => {
        try {
          const ordersRef = collection(db, 'artifacts', FIREBASE_APP_ID, 'public', 'data', COLLECTION_NAME);
          const cartTotal = state.cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
          
          const orderData = {
            userName: userName,
            items: state.cart,
            total: cartTotal,
            createdAt: serverTimestamp(),
            userId: state.user.uid
          };

          if (state.editingOrderId) {
            await updateDoc(doc(ordersRef, state.editingOrderId), orderData);
            showModal('成功', '訂單已成功修改！', 'success');
          } else {
            await addDoc(ordersRef, orderData);
            showModal('成功', '訂單已成功送出！', 'success');
          }

          userNameInput.value = '';
          state.cart = [];
          cancelEditMode();
          renderCart();
        } catch (error) {
          console.error("寫入失敗:", error);
          showModal('錯誤', '訂單送出失敗，請檢查網路。', 'error');
        }
      };
      
      if (state.isPastCutoff) {
        showModal('時間提醒', '現在已超過 10:00 截止時間，送出前請務必聯繫主揪人確認店家是否還收單喔！', 'confirm', executeSubmit);
      } else {
        executeSubmit();
      }
    });

    // 編輯模式
    window.editOrder = (orderId) => {
      const order = state.orders.find(o => o.id === orderId);
      if (!order) return;
      
      document.getElementById('user-name-input').value = order.userName;
      state.cart = JSON.parse(JSON.stringify(order.items)); 
      state.editingOrderId = order.id;
      
      document.getElementById('form-title').innerHTML = '<span class="bg-orange-500 text-black p-1 rounded"><i data-lucide="edit" class="w-5 h-5"></i></span> 修改訂單';
      document.getElementById('submit-btn-text').textContent = '更新訂單';
      document.getElementById('cancel-edit-btn').classList.remove('hidden');
      
      renderCart();
      lucide.createIcons();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    const cancelEditMode = () => {
      state.editingOrderId = null;
      document.getElementById('form-title').innerHTML = '<span class="bg-yellow-500 text-black p-1 rounded"><i data-lucide="plus" class="w-5 h-5"></i></span> 新增訂單';
      document.getElementById('submit-btn-text').textContent = '確認送出訂單';
      document.getElementById('cancel-edit-btn').classList.add('hidden');
      lucide.createIcons();
    };

    document.getElementById('cancel-edit-btn').addEventListener('click', () => {
      document.getElementById('user-name-input').value = '';
      state.cart = [];
      cancelEditMode();
      renderCart();
    });

    // 刪除單筆
    window.deleteOrder = (orderId) => {
      showModal('確認刪除', '確定要刪除這筆訂單嗎？', 'confirm', async () => {
        await deleteDoc(doc(db, 'artifacts', FIREBASE_APP_ID, 'public', 'data', COLLECTION_NAME, orderId));
      });
    };

    // 清除全部 (手動管理)
    document.getElementById('clear-all-btn').addEventListener('click', () => {
      if (state.orders.length === 0) return showModal('提示', '目前沒有任何訂單可以清除。', 'info');
      
      showModal('警告', '確定要清除「所有」訂購資料嗎？此動作無法復原！(通常用於結單後清空)', 'confirm', () => {
        const ordersRef = collection(db, 'artifacts', FIREBASE_APP_ID, 'public', 'data', COLLECTION_NAME);
        state.orders.forEach(async (order) => {
          await deleteDoc(doc(ordersRef, order.id));
        });
      });
    });

    // 複製明細
    document.getElementById('copy-orders-btn').addEventListener('click', () => {
      if (state.orders.length === 0) return showModal('提示', '目前沒有訂單可以複製。', 'warning');

      const dateStr = new Date().toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
      let textToCopy = `📅 ${dateStr} 【黑木燒肉飯】訂餐彙整
`;
      textToCopy += `------------------------
`;
      
      let grandTotal = 0;
      let itemCounts = {};

      state.orders.forEach(order => {
        const itemsText = order.items.map(i => {
          const remarkText = i.remark ? `(${i.remark})` : '';
          const key = `${i.name}${remarkText}`;
          itemCounts[key] = (itemCounts[key] || 0) + i.qty;
          return `${i.name}x${i.qty}${remarkText}`;
        }).join(', ');

        textToCopy += `👤 ${order.userName}: ${itemsText} = $${order.total}
`;
        grandTotal += order.total;
      });

      textToCopy += `------------------------
`;
      textToCopy += `📝 品項加總：
`;
      Object.entries(itemCounts).forEach(([name, qty]) => {
        textToCopy += `- ${name}: ${qty}份
`;
      });
      textToCopy += `💰 總金額: $${grandTotal}
`;

      const textArea = document.createElement("textarea");
      textArea.value = textToCopy;
      textArea.setAttribute('readonly', '');
      textArea.style.position = 'absolute';
      textArea.style.left = '-9999px';
      document.body.appendChild(textArea);
      
      textArea.select();
      textArea.setSelectionRange(0, 99999);
      
      try {
        document.execCommand('copy');
        showModal('成功', '訂單明細已複製！可直接貼到 LINE 群組囉。', 'success');
      } catch (err) {
        showModal('錯誤', '複製失敗，請嘗試手動選取文字。', 'error');
      }
      document.body.removeChild(textArea);
    });
  </script>
</body>
</html>
