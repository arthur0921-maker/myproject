<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>偶鵝嚐嚐 - 碧華國中教務處午餐團</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f7f3e8; /* 米色背景 */
            -webkit-font-smoothing: antialiased;
        }
        .watermark {
            font-size: 0.8rem;
            color: #a89b97;
            text-align: center;
            opacity: 0.6;
            margin-top: 4px;
        }
        /* 自定義捲軸 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #d4a373; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #bc8a5f; 
        }
        .deadline-passed {
            color: #ef4444;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-[#f7f3e8] text-gray-800 min-h-[100dvh] flex flex-col md:h-[100dvh] md:overflow-hidden">

    <div id="customModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 hidden transition-opacity duration-300 opacity-0 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl p-6 w-11/12 max-w-sm transform transition-all scale-95 duration-300 border-t-4 border-orange-500">
            <h3 id="modalTitle" class="text-xl font-bold text-gray-800 mb-2 flex items-center gap-2"></h3>
            <p id="modalMessage" class="text-gray-600 mb-6 leading-relaxed"></p>
            <div id="modalActions" class="flex justify-end gap-3">
                </div>
        </div>
    </div>

    <div id="loadingOverlay" class="fixed inset-0 z-40 flex items-center justify-center bg-white bg-opacity-80 backdrop-blur-sm">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500 mb-3"></div>
            <p id="loadingText" class="text-gray-600 font-bold animate-pulse">連線同步中...</p>
        </div>
    </div>

    <header class="bg-white shadow-md z-40 shrink-0 border-t-4 border-orange-500 sticky top-0" id="mainHeader">
        <div class="container mx-auto px-4 py-3">
            <div class="flex flex-col md:flex-row justify-between items-center gap-3">
                
                <div class="text-center md:text-left flex-1 w-full md:w-auto">
                    <div class="flex flex-wrap items-baseline gap-3 justify-center md:justify-start">
                        <h1 class="text-2xl md:text-3xl font-bold text-gray-800 tracking-wide flex items-center gap-2">
                            <span>🦢 偶鵝嚐嚐</span>
                            <span class="text-sm text-gray-400 font-normal self-end mb-1">V3.2 (碧華專用版)</span>
                            <span class="text-xs bg-orange-100 text-orange-800 px-2 py-1 rounded-lg border border-orange-200">碧華國中團</span>
                        </h1>
                        <div id="clockDisplay" class="text-lg font-mono font-bold text-gray-600 bg-gray-100 px-2 rounded">00:00:00</div>
                    </div>
                    <div class="flex items-center justify-center md:justify-start gap-2 mt-1">
                        <p class="text-xs text-gray-500">📍 碧華國中教務處午餐團</p>
                        <span class="text-gray-300">|</span>
                        <p class="text-xs text-gray-500">📅 <span id="currentDate"></span> (每日 10:00 截止)</p>
                    </div>
                </div>

                <div class="flex flex-wrap gap-2 w-full md:w-auto justify-center">
                    <button onclick="window.confirmClearAll()" class="bg-red-50 hover:bg-red-100 text-red-600 border border-red-200 font-bold py-2 px-4 rounded-lg shadow-sm transition-all text-sm flex items-center gap-1 active:scale-95 whitespace-nowrap">
                        <span>🗑️</span> 清除今天訂購資料
                    </button>
                    <button onclick="window.copyAllOrders()" class="bg-gray-800 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg shadow transition-all text-sm flex items-center gap-1 active:scale-95 whitespace-nowrap">
                        <span>📋</span> 複製訂單
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row relative">
        
        <section class="w-full md:w-2/3 flex flex-col border-b md:border-b-0 md:border-r border-gray-200 bg-[#fbfbfb] md:h-full relative">
            
            <div class="p-3 bg-white border-b border-orange-100 shrink-0 shadow-sm z-20">
                <div class="flex flex-col sm:flex-row gap-2 items-end max-w-4xl mx-auto md:mx-0">
                    
                    <div class="flex-1 w-full sm:w-auto grid grid-cols-2 sm:grid-cols-5 gap-2">
                        <div class="col-span-2 sm:col-span-2">
                            <label class="block text-xs font-bold text-gray-500 mb-1 ml-1">誰要點餐？</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">👤</span>
                                <input type="text" id="userName" placeholder="請輸入姓名 / 處室" class="w-full pl-9 pr-2 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-400 focus:border-orange-400 focus:outline-none transition-all text-sm">
                            </div>
                        </div>

                        <div class="col-span-2 sm:col-span-3">
                            <label class="block text-xs font-bold text-gray-500 mb-1 ml-1">備註 (選填)</label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400">✏️</span>
                                <input type="text" id="userNote" placeholder="例：不要蔥、飯少" class="w-full pl-9 pr-2 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-400 focus:border-orange-400 focus:outline-none transition-all text-sm">
                            </div>
                        </div>
                    </div>

                    <button onclick="window.submitOrder()" class="w-full sm:w-auto bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-6 rounded-lg shadow-md whitespace-nowrap h-[42px] flex items-center justify-center gap-2 transition-transform active:scale-95">
                        <span>送出</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="flex overflow-x-auto gap-2 p-2 bg-white border-b border-gray-200 shrink-0 no-scrollbar shadow-[0_2px_5px_rgba(0,0,0,0.02)] z-30 sticky md:static top-[70px] md:top-0" id="categoryTabs">
                </div>

            <div id="menuContainer" class="flex-1 overflow-y-visible md:overflow-y-auto p-4 bg-[#f7f3e8]">
                <div id="menuGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-3 pb-20">
                    </div>
            </div>
            
            <div id="currentSelectionBar" class="fixed md:absolute bottom-4 left-4 right-4 md:left-1/2 md:-translate-x-1/2 md:w-auto md:min-w-[300px] bg-gray-800 text-white p-3 rounded-full shadow-2xl flex justify-between items-center z-50 md:z-20 hidden transform transition-all duration-300 hover:scale-105 cursor-pointer" onclick="window.submitOrder()">
                <div class="flex items-center gap-2 px-2">
                    <div class="bg-orange-500 rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold" id="currentCount">0</div>
                    <span class="text-sm">準備下單...</span>
                </div>
                <div class="flex items-center gap-2 px-2 border-l border-gray-600 pl-3">
                    <span class="text-xs text-gray-400">小計</span>
                    <span class="font-bold text-lg text-orange-400">$<span id="currentTotal">0</span></span>
                </div>
            </div>
        </section>

        <section id="orderSection" class="w-full md:w-1/3 bg-white flex flex-col md:h-full shadow-xl z-10">
            <div class="p-3 bg-gray-100 font-bold text-gray-700 flex justify-between items-center shrink-0 border-b border-gray-200 sticky md:static top-[70px] md:top-0 z-20">
                <span class="flex items-center gap-2">📋 今日訂單清單</span>
                <span class="text-xs bg-gray-700 text-white px-2 py-1 rounded-full" id="totalOrdersCount">0筆</span>
            </div>
            
            <div id="ordersList" class="flex-1 overflow-y-visible md:overflow-y-auto p-3 space-y-3 bg-gray-50 min-h-[300px]">
                <div class="text-center text-gray-400 mt-20 flex flex-col items-center">
                    <div class="w-16 h-16 bg-gray-200 rounded-full flex items-center justify-center text-3xl mb-3">🍽️</div>
                    <p>目前還沒有人點餐</p>
                    <p class="text-xs mt-2">連線同步中...</p>
                </div>
            </div>

            <div class="p-4 bg-white border-t border-gray-200 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] sticky bottom-0 md:static z-20">
                <div class="flex justify-between items-center text-xl font-bold">
                    <span class="text-gray-600 text-base">本日總金額</span>
                    <span class="text-red-600 font-mono text-2xl">$<span id="grandTotal">0</span></span>
                </div>
                <div class="text-xs text-right text-gray-400 mt-1 watermark">Designed by Arthur WU</div>
            </div>
        </section>

    </main>

    <script type="module">
        // 1. 使用 Firebase 12.7.0 SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

        // 您的設定檔
        const firebaseConfig = {
            apiKey: "AIzaSyCi4D6TUHM88K6_gbKlU2RW7ECKfSqR2zk",
            authDomain: "myorder-o2.firebaseapp.com",
            projectId: "myorder-o2",
            storageBucket: "myorder-o2.firebasestorage.app",
            messagingSenderId: "1018780108356",
            appId: "1:1018780108356:web:9792d9f2bcbcc0d8209e11",
            measurementId: "G-9Y8QM1TBVW"
        };
        
        // 路徑對應設定
        const APP_ID_FOR_DB = "myorder-o2"; 
        const DATA_COLLECTION_NAME = "lunch_orders_v2"; 

        // Firebase Init
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentUser = null;

        // 取得正確的 Collection 參考
        function getOrdersCollectionRef() {
            return collection(db, 'artifacts', APP_ID_FOR_DB, 'public', 'data', DATA_COLLECTION_NAME);
        }

        // --- 0. Custom Modal System (修改加入回呼機制) ---
        window.showModal = function(title, message, type = 'info', onConfirm = null) {
            const modal = document.getElementById('customModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalMessage = document.getElementById('modalMessage');
            const modalActions = document.getElementById('modalActions');

            modalTitle.innerHTML = title;
            modalMessage.innerHTML = message;
            modalActions.innerHTML = ''; 

            if (type === 'confirm') {
                const cancelBtn = document.createElement('button');
                cancelBtn.className = "px-4 py-2 bg-gray-100 text-gray-600 rounded-lg hover:bg-gray-200 font-bold transition-colors";
                cancelBtn.textContent = "取消";
                cancelBtn.onclick = window.closeModal;

                const confirmBtn = document.createElement('button');
                confirmBtn.className = "px-4 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 font-bold shadow-md transition-colors";
                confirmBtn.textContent = "確定執行";
                confirmBtn.onclick = () => {
                    if (onConfirm) onConfirm();
                    window.closeModal();
                };

                modalActions.appendChild(cancelBtn);
                modalActions.appendChild(confirmBtn);
            } else {
                const okBtn = document.createElement('button');
                okBtn.className = "px-5 py-2 bg-gray-800 text-white rounded-lg hover:bg-gray-700 font-bold shadow-md transition-colors w-full sm:w-auto";
                okBtn.textContent = "知道了";
                okBtn.onclick = () => {
                    window.closeModal();
                    if (onConfirm) onConfirm(); // 點擊知道了後觸發回呼
                };
                modalActions.appendChild(okBtn);
            }

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
                modal.querySelector('div').classList.add('scale-100');
            }, 10);
        };

        window.closeModal = function() {
            const modal = document.getElementById('customModal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.remove('scale-100');
            modal.querySelector('div').classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        };

        // --- 1. Data & Global Vars ---
        // ⚠️ 這裡僅為部分菜單，請將您完整的 menuData 替換回來
        const menuData = [
            {
                category: "便當系列",
                icon: "🍱",
                items: [
                    { name: "招牌無骨鵝肉飯便當", price: 110, tag: "人氣" },
                    { name: "蔗香煙燻鵝肉飯便當", price: 110 },
                    { name: "鮮嫩鹹水鵝肉飯便當", price: 110 },
                    { name: "鵝肉壽喜燒便當", price: 110 },
                    { name: "無骨蔗香鵝肉飯便當", price: 120 },
                    { name: "鮮嫩無骨鹹水鵝肉飯便當", price: 120, tag: "推" },
                    { name: "台式打拋鵝肉便當", price: 130 },
                    { name: "蔥醬鵝腿便當", price: 150, tag: "限量" }
                ]
            },
            {
                category: "偶鵝肉盤",
                icon: "🦢",
                items: [
                    { name: "招牌糖燻鵝肉(1~2人)", price: 200 },
                    { name: "招牌糖燻鵝肉(3~4人)", price: 350 },
                    { name: "招牌嫩鹹水鵝(1~2人)", price: 200 },
                    { name: "招牌嫩鹹水鵝(3~4人)", price: 350 }
                ]
            },
            {
                category: "人氣主食",
                icon: "🍜",
                items: [
                    { name: "香蔥鵝油乾拌麵線", price: 40 },
                    { name: "偶鵝嚐嚐(招牌飯)", price: 65, tag: "招牌" },
                    { name: "特上鵝肉飯", price: 65 },
                    { name: "鵝肉乾麵", price: 80 },
                    { name: "鵝肉湯麵", price: 80 },
                    { name: "香蔥鵝油飯", price: 20 },
                    { name: "古早味瓜仔鵝燥飯", price: 35 },
                    { name: "乾麵", price: 40 },
                    { name: "湯麵", price: 40 },
                    { name: "乾冬粉", price: 40 },
                    { name: "湯冬粉", price: 40 }
                ]
            },
            {
                category: "美味小菜",
                icon: "🥬",
                items: [
                    { name: "鵝心肝", price: 60 },
                    { name: "涼拌鵝掌", price: 60 },
                    { name: "滷白菜", price: 40 },
                    { name: "桂竹筍", price: 40 },
                    { name: "燙青菜", price: 40 }
                ]
            },
            {
                category: "鮮美湯品",
                icon: "🥣",
                items: [
                    { name: "鵝肉丸湯", price: 40 },
                    { name: "綜合下水湯", price: 60 }
                ]
            }
        ];

        let tempCart = {}; // { "Item Name": { price: 100, qty: 2 } }
        let currentCategory = "便當系列";
        let todayOrders = [];

        // --- 2. Clock & Date ---
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false });
            document.getElementById('clockDisplay').textContent = timeStr;
            
            const dateStr = now.toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit', weekday: 'short' });
            document.getElementById('currentDate').textContent = dateStr;

            // 檢查是否超過早上 10 點
            const isDeadlinePassed = now.getHours() >= 10;
            const clockEl = document.getElementById('clockDisplay');
            if (isDeadlinePassed) {
                clockEl.classList.add('deadline-passed');
            } else {
                clockEl.classList.remove('deadline-passed');
            }
        }
        setInterval(updateTime, 1000);
        updateTime();

        // --- 3. Render UI ---
        function renderCategoryTabs() {
            const tabsContainer = document.getElementById('categoryTabs');
            tabsContainer.innerHTML = '';
            menuData.forEach(cat => {
                const btn = document.createElement('button');
                const isSelected = cat.category === currentCategory;
                btn.className = `px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all ${isSelected ? 'bg-orange-500 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`;
                btn.innerHTML = `${cat.icon} ${cat.category}`;
                btn.onclick = () => {
                    currentCategory = cat.category;
                    renderCategoryTabs();
                    renderMenu();
                };
                tabsContainer.appendChild(btn);
            });
        }

        window.adjustQuantity = function(itemName, price, delta) {
            if (!tempCart[itemName]) {
                if (delta > 0) tempCart[itemName] = { price: price, qty: delta };
            } else {
                tempCart[itemName].qty += delta;
                if (tempCart[itemName].qty <= 0) delete tempCart[itemName];
            }
            updateCartUI();
            renderMenu();
        };

        function updateCartUI() {
            let totalQty = 0;
            let totalPrice = 0;
            for (let item in tempCart) {
                totalQty += tempCart[item].qty;
                totalPrice += tempCart[item].price * tempCart[item].qty;
            }

            const bar = document.getElementById('currentSelectionBar');
            document.getElementById('currentCount').textContent = totalQty;
            document.getElementById('currentTotal').textContent = totalPrice;

            if (totalQty > 0) {
                bar.classList.remove('hidden');
            } else {
                bar.classList.add('hidden');
            }
        }

        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '';
            const categoryData = menuData.find(c => c.category === currentCategory);
            
            if (categoryData) {
                categoryData.items.forEach(item => {
                    const currentQty = tempCart[item.name]?.qty || 0;
                    const card = document.createElement('div');
                    card.className = `bg-white rounded-xl p-4 flex flex-col justify-between shadow-sm border transition-all ${currentQty > 0 ? 'border-orange-400 ring-1 ring-orange-400 bg-orange-50' : 'border-gray-100 hover:shadow-md'}`;
                    
                    let tagHtml = item.tag ? `<span class="text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded ml-2 font-bold">${item.tag}</span>` : '';

                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-1">
                                <h4 class="font-bold text-gray-800 text-sm sm:text-base flex-1">${item.name}${tagHtml}</h4>
                            </div>
                            <p class="text-orange-600 font-bold text-lg mb-3">$${item.price}</p>
                        </div>
                        <div class="flex items-center justify-end gap-3 mt-auto">
                            <button onclick="window.adjustQuantity('${item.name}', ${item.price}, -1)" class="w-8 h-8 rounded-full bg-gray-100 text-gray-600 flex items-center justify-center font-bold hover:bg-gray-200 active:bg-gray-300 ${currentQty === 0 ? 'opacity-50 cursor-not-allowed' : ''}" ${currentQty === 0 ? 'disabled' : ''}>-</button>
                            <span class="font-bold w-4 text-center text-lg ${currentQty > 0 ? 'text-orange-600' : 'text-gray-400'}">${currentQty}</span>
                            <button onclick="window.adjustQuantity('${item.name}', ${item.price}, 1)" class="w-8 h-8 rounded-full bg-orange-500 text-white flex items-center justify-center font-bold hover:bg-orange-600 active:bg-orange-700">+</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        // --- 4. Render Orders List ---
        function renderOrders() {
            const list = document.getElementById('ordersList');
            let grandTotal = 0;
            let totalCount = 0;

            if (todayOrders.length === 0) {
                list.innerHTML = `
                    <div class="text-center text-gray-400 mt-20 flex flex-col items-center">
                        <div class="w-16 h-16 bg-gray-200 rounded-full flex items-center justify-center text-3xl mb-3">🍽️</div>
                        <p>今天還沒有人點餐</p>
                        <p class="text-xs mt-1">趕快搶頭香！</p>
                    </div>`;
                document.getElementById('grandTotal').textContent = 0;
                document.getElementById('totalOrdersCount').textContent = "0筆";
                return;
            }

            list.innerHTML = '';
            
            // 排序：新的在前面
            todayOrders.sort((a, b) => b.timestamp - a.timestamp).forEach(order => {
                grandTotal += order.total;
                totalCount += 1;

                let itemsHtml = '';
                for(let key in order.items) {
                    itemsHtml += `<div class="flex justify-between text-sm text-gray-600 mb-1">
                        <span>- ${key} x${order.items[key].qty}</span>
                        <span>$${order.items[key].price * order.items[key].qty}</span>
                    </div>`;
                }

                const card = document.createElement('div');
                card.className = "bg-white p-3 rounded-xl shadow-sm border border-gray-100 relative group";
                
                const timeStr = new Date(order.timestamp).toLocaleTimeString('zh-TW', { hour: '2-digit', minute:'2-digit' });
                const noteHtml = order.note ? `<div class="mt-2 text-xs bg-yellow-50 text-yellow-700 p-2 rounded-lg border border-yellow-100 font-bold">備註: ${order.note}</div>` : '';

                card.innerHTML = `
                    <button onclick="window.confirmDelete('${order.id}', '${order.name}')" class="absolute top-2 right-2 text-gray-300 hover:text-red-500 hidden md:block group-hover:block transition-colors" title="刪除此筆訂單">
                        🗑️
                    </button>
                    <button onclick="window.confirmDelete('${order.id}', '${order.name}')" class="absolute top-2 right-2 text-gray-400 md:hidden p-1" title="刪除此筆訂單">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                    <div class="flex justify-between items-baseline mb-2 border-b border-gray-50 pb-2 pr-6">
                        <div class="font-bold text-gray-800 text-base flex items-center gap-1">
                            <span class="bg-gray-100 text-gray-500 text-[10px] px-1.5 py-0.5 rounded">${timeStr}</span>
                            ${order.name}
                        </div>
                        <div class="font-bold text-orange-600">$${order.total}</div>
                    </div>
                    <div>${itemsHtml}</div>
                    ${noteHtml}
                `;
                list.appendChild(card);
            });

            document.getElementById('grandTotal').textContent = grandTotal;
            document.getElementById('totalOrdersCount').textContent = `${totalCount}筆`;
        }

        // --- 5. Firebase Actions ---
        window.submitOrder = async function() {
            const name = document.getElementById('userName').value.trim();
            const note = document.getElementById('userNote').value.trim();

            if (!name) {
                window.showModal('⚠️ 錯誤', '請填寫「誰要點餐」喔！', 'info');
                document.getElementById('userName').focus();
                return;
            }

            let items = {};
            let currentTotal = 0;
            let totalCount = 0;
            for(let key in tempCart) {
                items[key] = tempCart[key];
                currentTotal += tempCart[key].price * tempCart[key].qty;
                totalCount += tempCart[key].qty;
            }

            if (Object.keys(items).length === 0) {
                window.showModal('⚠️ 錯誤', '購物車是空的，請先選擇餐點。', 'info');
                return;
            }

            try {
                await addDoc(getOrdersCollectionRef(), {
                    name: name,
                    note: note,
                    items: items,
                    total: currentTotal,
                    timestamp: new Date().getTime()
                });

                // 【修改這裡】加入平滑滾動的回呼機制
                window.showModal('✅ 訂購成功', `已成功送出 ${totalCount} 份餐點，總計 $${currentTotal}。<br>請記得將金額交給總務唷！`, 'info', () => {
                    if (window.innerWidth < 768) {
                        document.getElementById('orderSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });

                document.getElementById('userName').value = '';
                document.getElementById('userNote').value = '';
                tempCart = {};
                updateCartUI();

            } catch (error) {
                console.error("Error adding document: ", error);
                window.showModal('❌ 訂購失敗', '無法連接到伺服器，請稍後再試。');
            }
        };

        window.confirmDelete = function(id, name) {
            window.showModal('⚠️ 刪除確認', `確定要刪除 <b>${name}</b> 的訂單嗎？`, 'confirm', async () => {
                try {
                    await deleteDoc(doc(db, 'artifacts', APP_ID_FOR_DB, 'public', 'data', DATA_COLLECTION_NAME, id));
                } catch (error) {
                    console.error("Error deleting document: ", error);
                    window.showModal('❌ 錯誤', '刪除失敗，請稍後再試。');
                }
            });
        };

        window.confirmClearAll = function() {
            window.showModal('🚨 警告', '確定要清除今天「所有」訂購資料嗎？這個動作無法復原！', 'confirm', async () => {
                try {
                    const querySnapshot = await getDocs(getOrdersCollectionRef());
                    querySnapshot.forEach(async (docSnap) => {
                        await deleteDoc(doc(db, 'artifacts', APP_ID_FOR_DB, 'public', 'data', DATA_COLLECTION_NAME, docSnap.id));
                    });
                } catch (error) {
                    console.error("Error clearing documents: ", error);
                    window.showModal('❌ 錯誤', '清除失敗。');
                }
            });
        };

        // --- 6. 統整與複製訂單 ---
        window.copyAllOrders = function() {
            if (todayOrders.length === 0) {
                window.showModal('提示', '目前沒有訂單可以複製');
                return;
            }

            let summary = {};
            let text = "📋 【碧華午餐團】今日訂單總表\n";
            text += `📅 日期：${document.getElementById('currentDate').textContent}\n`;
            text += "------------------------\n";
            
            let totalMoney = 0;
            let totalQty = 0;

            todayOrders.forEach(order => {
                totalMoney += order.total;
                text += `👤 ${order.name} ($${order.total})\n`;
                for (let key in order.items) {
                    const qty = order.items[key].qty;
                    text += `   - ${key} x${qty}\n`;
                    
                    if (!summary[key]) {
                        summary[key] = { qty: 0, price: order.items[key].price };
                    }
                    summary[key].qty += qty;
                    totalQty += qty;
                }
                if (order.note) {
                    text += `   💡 備註: ${order.note}\n`;
                }
                text += "\n";
            });

            text += "------------------------\n";
            text += "📦 【總數量統計】\n";
            for (let key in summary) {
                text += `${key}： ${summary[key].qty} 份\n`;
            }
            text += "------------------------\n";
            text += `💰 總共 ${totalQty} 份餐點，總金額 $${totalMoney}\n`;

            navigator.clipboard.writeText(text).then(() => {
                window.showModal('✅ 複製成功', '已將訂單明細與總表複製到剪貼簿，可以直接貼到 LINE 群組囉！');
            }).catch(err => {
                console.error('Could not copy text: ', err);
                window.showModal('❌ 複製失敗', '您的瀏覽器不支援自動複製，請手動截圖。');
            });
        };

        // --- 7. Auth & Start ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                
                // 訂閱資料庫變化 (即時更新)
                onSnapshot(getOrdersCollectionRef(), (snapshot) => {
                    const newOrders = [];
                    // 只抓取當天的訂單邏輯 (簡單版：假設資料庫只有今天的，因為每天會清除)
                    snapshot.forEach((doc) => {
                        newOrders.push({
                            id: doc.id,
                            ...doc.data()
                        });
                    });
                    todayOrders = newOrders;
                    renderOrders();
                    document.getElementById('loadingOverlay').classList.add('hidden');
                }, (error) => {
                    console.error("即時同步失敗: ", error);
                    document.getElementById('loadingText').textContent = "無法連線到資料庫";
                    document.getElementById('loadingText').classList.add('text-red-500');
                });
            } else {
                signInAnonymously(auth).catch((error) => {
                    console.error("登入失敗:", error);
                    document.getElementById('loadingText').textContent = "系統登入失敗，請重新整理";
                });
            }
        });

        // Initial Render
        renderCategoryTabs();
        renderMenu();
    </script>
</body>
</html>
