<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教檢雲端題庫系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SUBJECTS = [
      {
        id: 'curriculum',
        name: '課程教學與評量',
        icon: 'M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253',
        color: 'indigo',
        url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSHJYiIy7UvEy3MBwiKPr9lRatsPnwQK3BbADvkNbB4KPQJz5I_4vzsD6w722XORCP8_rk5agQoc-0A/pub?gid=387485061&single=true&output=csv'
      },
      {
        id: 'development',
        name: '學習者發展與適性輔導',
        icon: 'M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z',
        color: 'emerald',
        url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSHJYiIy7UvEy3MBwiKPr9lRatsPnwQK3BbADvkNbB4KPQJz5I_4vzsD6w722XORCP8_rk5agQoc-0A/pub?gid=1957505350&single=true&output=csv'
      },
      {
        id: 'philosophy',
        name: '教育理念與實務',
        icon: 'M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z',
        color: 'amber',
        url: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSHJYiIy7UvEy3MBwiKPr9lRatsPnwQK3BbADvkNbB4KPQJz5I_4vzsD6w722XORCP8_rk5agQoc-0A/pub?gid=1911281508&single=true&output=csv'
      }
    ];

    function App() {
      const [appState, setAppState] = useState('select_subject'); 
      const [selectedSubject, setSelectedSubject] = useState(null);
      const [database, setDatabase] = useState([]);
      const [currentQuestions, setCurrentQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [userAnswers, setUserAnswers] = useState({});
      const [score, setScore] = useState(0);
      const [errorMsg, setErrorMsg] = useState('');

      const handleSubjectSelect = (subject) => {
        setSelectedSubject(subject);
        fetchData(subject.url);
      };

      const fetchData = async (url) => {
        setAppState('loading');
        setErrorMsg('');
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error(`HTTP 錯誤! 狀態碼: ${response.status}`);
          const csvText = await response.text();
          const data = parseCSV(csvText);
          
          if (data && data.length > 0) {
            setDatabase(data);
            setAppState('ready');
          } else {
            throw new Error('無法解析資料，或檔案內容為空。');
          }
        } catch (err) {
          console.error("Fetch Error:", err);
          setErrorMsg('無法載入題庫，請確認您的網路連線或連結狀態。如果您在本地端測試，請透過 Live Server 開啟以避免 CORS 錯誤。');
          setAppState('error');
        }
      };

      const parseCSV = (csvText) => {
        try {
          const lines = csvText.split(/\r\n|\n/).filter(line => line.trim() !== '');
          if (lines.length < 2) return null;

          const parsedData = [];
          
          for (let i = 1; i < lines.length; i++) {
            let rowData = [];
            let curVal = "";
            let inQuotes = false;
            
            for (let char of lines[i]) {
              if (char === '"') {
                inQuotes = !inQuotes;
              } else if (char === ',' && !inQuotes) {
                rowData.push(curVal);
                curVal = "";
              } else {
                curVal += char;
              }
            }
            rowData.push(curVal);

            // 確保資料庫至少有抓到選項
            if (rowData.length >= 6) {
              const cleanOption = (text, prefix) => {
                 if (!text) return "";
                 let cleaned = text.replace(/^"|"$/g, '').trim();
                 const regex = new RegExp(`^\\(${prefix}\\)\\s*`);
                 return cleaned.replace(regex, '').trim();
              };

              // 依據您提供的新版試算表結構抓取資料
              parsedData.push({
                answer: rowData[0] ? rowData[0].replace(/^"|"$/g, '').trim() : '',
                question: rowData[1] ? rowData[1].replace(/^"|"$/g, '').trim() : '',
                options: {
                  A: cleanOption(rowData[2], 'A'),
                  B: cleanOption(rowData[3], 'B'),
                  C: cleanOption(rowData[4], 'C'),
                  D: cleanOption(rowData[5], 'D')
                },
                id: i, // 直接使用列數作為 ID
                concept: rowData[6] ? rowData[6].replace(/^"|"$/g, '').trim() : '未分類', // 第 G 欄
                year: rowData[7] ? rowData[7].replace(/^"|"$/g, '').trim() : '',         // 第 H 欄
                explanation: rowData[8] ? rowData[8].replace(/^"|"$/g, '').trim() : ''    // 第 I 欄
              });
            }
          }
          return parsedData.filter(q => q.question && q.answer && q.options.A);
        } catch (err) {
          console.error("CSV Parse Error:", err);
          return null;
        }
      };

      const startQuiz = (numQuestions = 10) => {
        const shuffled = [...database].sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, Math.min(numQuestions, database.length));
        
        setCurrentQuestions(selected);
        setCurrentIndex(0);
        setUserAnswers({});
        setScore(0);
        setAppState('playing');
      };

      const handleAnswerSelect = (optionKey) => {
        setUserAnswers({
          ...userAnswers,
          [currentIndex]: optionKey
        });
      };

      const handleNext = () => {
        if (currentIndex < currentQuestions.length - 1) {
          setCurrentIndex(currentIndex + 1);
        } else {
          calculateScore();
          setAppState('result');
        }
      };

      const calculateScore = () => {
        let currentScore = 0;
        currentQuestions.forEach((q, index) => {
          if (userAnswers[index] === q.answer) {
            currentScore += 100 / currentQuestions.length; 
          }
        });
        setScore(Math.round(currentScore));
      };

      const backToHome = () => {
        setSelectedSubject(null);
        setDatabase([]);
        setAppState('select_subject');
      };

      const renderSelectSubject = () => (
        <section className="flex flex-col items-center justify-center min-h-[70vh] px-4 animate-fade-in">
          <div className="text-center mb-10">
            <h1 className="text-4xl md:text-5xl font-extrabold text-gray-800 mb-4 tracking-tight">
              教檢雲端刷題系統
            </h1>
            <p className="text-lg md:text-xl text-gray-600">
              請選擇您要測驗的考科，開始進行模擬測驗
            </p>
          </div>
          
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl w-full">
            {SUBJECTS.map((sub) => (
              <button
                key={sub.id}
                onClick={() => handleSubjectSelect(sub)}
                className={`group bg-white rounded-3xl p-8 shadow-sm hover:shadow-xl border border-gray-100 hover:border-${sub.color}-300 transition-all duration-300 flex flex-col items-center text-center transform hover:-translate-y-1`}
              >
                <div className={`w-20 h-20 rounded-2xl bg-${sub.color}-50 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300`}>
                  <svg className={`w-10 h-10 text-${sub.color}-600`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d={sub.icon}></path>
                  </svg>
                </div>
                <h3 className="text-xl font-bold text-gray-800 mb-2">{sub.name}</h3>
                <p className={`text-sm text-gray-500 font-medium group-hover:text-${sub.color}-600 transition-colors`}>
                  點擊開始載入題庫
                </p>
              </button>
            ))}
          </div>
        </section>
      );

      const renderLoading = () => (
        <section className="flex flex-col items-center justify-center min-h-[60vh] text-center px-4 animate-fade-in">
          <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-indigo-600 mb-6"></div>
          <h2 className="text-2xl font-bold text-gray-800 mb-2">正在載入雲端題庫...</h2>
          <p className="text-gray-500">正在與 Google 試算表同步【{selectedSubject?.name}】資料</p>
        </section>
      );

      const renderError = () => (
        <section className="flex flex-col items-center justify-center min-h-[60vh] text-center px-4 animate-fade-in">
          <div className="bg-red-50 p-8 rounded-3xl border border-red-200 max-w-md w-full">
            <svg className="w-16 h-16 text-red-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <h2 className="text-2xl font-bold text-red-700 mb-2">載入失敗</h2>
            <p className="text-red-600 mb-6 text-sm leading-relaxed">{errorMsg}</p>
            <div className="flex flex-col gap-3">
              <button onClick={() => fetchData(selectedSubject.url)} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md">
                重新嘗試連線
              </button>
              <button onClick={backToHome} className="w-full bg-white hover:bg-gray-50 text-gray-700 font-bold py-3 px-6 rounded-xl transition-all border border-gray-200">
                返回科目選擇
              </button>
            </div>
          </div>
        </section>
      );

      const renderReady = () => (
        <section className="flex flex-col items-center justify-center min-h-[60vh] text-center px-4 animate-fade-in">
          <div className={`inline-flex items-center justify-center p-4 bg-${selectedSubject.color}-50 rounded-full mb-6`}>
             <svg className={`w-12 h-12 text-${selectedSubject.color}-600`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d={selectedSubject.icon}></path>
             </svg>
          </div>
          <h2 className="text-3xl md:text-4xl font-bold text-gray-800 mb-4 tracking-tight">
            {selectedSubject.name}
          </h2>
          <p className="text-lg md:text-xl text-gray-600 mb-8">
            已成功同步題庫，共載入 <span className={`font-black text-${selectedSubject.color}-600 text-2xl`}>{database.length}</span> 題
          </p>
          <div className="bg-white p-8 rounded-3xl shadow-lg max-w-md w-full border border-gray-100">
            <p className="text-gray-600 mb-6 text-sm font-medium">
              系統將從題庫中隨機抽出 10 題進行模擬測驗。準備好了嗎？
            </p>
            <button
              onClick={() => startQuiz(10)}
              className={`w-full bg-${selectedSubject.color}-600 hover:bg-${selectedSubject.color}-700 text-white font-bold py-4 px-6 rounded-xl transition-all shadow-md mb-4 text-lg flex justify-center items-center`}
            >
              <svg className="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
              開始隨機測驗 (10題)
            </button>
            <button
              onClick={backToHome}
              className="w-full bg-gray-50 hover:bg-gray-100 text-gray-500 font-bold py-3 px-6 rounded-xl transition-all text-sm border border-gray-200"
            >
              重新選擇科目
            </button>
          </div>
        </section>
      );

      const renderPlaying = () => {
        const question = currentQuestions[currentIndex];
        const isAnswered = !!userAnswers[currentIndex];
        const progress = ((currentIndex + 1) / currentQuestions.length) * 100;

        return (
          <article className="max-w-3xl mx-auto w-full px-4 animate-fade-in">
            <div className="mb-8">
              <div className="flex justify-between items-end mb-2">
                <span className={`text-sm font-bold text-${selectedSubject.color}-600 bg-${selectedSubject.color}-50 px-3 py-1 rounded-full`}>
                  {selectedSubject.name}
                </span>
                <span className="text-sm font-medium text-gray-500">
                  第 {currentIndex + 1} / {currentQuestions.length} 題
                </span>
              </div>
              <div className="w-full bg-gray-200 rounded-full h-2.5 mt-3">
                <div className={`bg-${selectedSubject.color}-600 h-2.5 rounded-full transition-all duration-300`} style={{ width: `${progress}%` }}></div>
              </div>
            </div>

            <div className="bg-white rounded-3xl shadow-sm p-6 md:p-8 mb-6 border border-gray-100">
              <div className="flex justify-between items-center mb-6">
                 <div className="flex gap-2">
                   <span className="inline-block bg-gray-100 text-gray-600 text-xs px-3 py-1.5 rounded-md font-medium">
                     考點：{question.concept}
                   </span>
                   {question.year && (
                     <span className="inline-block bg-blue-50 text-blue-600 text-xs px-3 py-1.5 rounded-md font-medium border border-blue-100">
                       {question.year}
                     </span>
                   )}
                 </div>
              </div>
              <h2 className="text-xl md:text-2xl font-semibold text-gray-800 leading-relaxed mb-8">
                {question.question}
              </h2>

              <div className="space-y-3">
                {['A', 'B', 'C', 'D'].map((key) => {
                  if (!question.options[key]) return null;
                  return (
                    <button
                      key={key}
                      onClick={() => handleAnswerSelect(key)}
                      className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-start ${
                        userAnswers[currentIndex] === key
                          ? `border-${selectedSubject.color}-600 bg-${selectedSubject.color}-50 text-${selectedSubject.color}-900 shadow-sm`
                          : `border-gray-200 hover:border-${selectedSubject.color}-300 hover:bg-gray-50 text-gray-700`
                      }`}
                    >
                      <span className={`font-bold mr-3 text-lg flex-shrink-0 ${userAnswers[currentIndex] === key ? `text-${selectedSubject.color}-600` : 'text-gray-400'}`}>
                        {key}.
                      </span>
                      <span className="text-md pt-0.5 leading-relaxed">{question.options[key]}</span>
                    </button>
                  )
                })}
              </div>
            </div>

            <div className="flex justify-between mt-8">
              <button
                 onClick={() => {
                   if(window.confirm('確定要放棄目前的測驗進度並返回首頁嗎？')) setAppState('ready');
                 }}
                 className="px-6 py-3 rounded-xl font-bold text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition-all"
              >
                中斷測驗
              </button>
              <button
                onClick={handleNext}
                disabled={!isAnswered}
                className={`px-8 py-3 rounded-xl font-bold transition-all flex items-center ${
                  isAnswered
                    ? `bg-${selectedSubject.color}-600 hover:bg-${selectedSubject.color}-700 text-white shadow-md`
                    : 'bg-gray-200 text-gray-400 cursor-not-allowed'
                }`}
              >
                {currentIndex < currentQuestions.length - 1 ? '下一題' : '提交並查看成績'}
                {isAnswered && currentIndex < currentQuestions.length - 1 && (
                  <svg className="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>
                )}
              </button>
            </div>
          </article>
        );
      };

      const renderResult = () => (
        <section className="max-w-4xl mx-auto w-full px-4 animate-fade-in pb-12">
          <div className="bg-white rounded-3xl shadow-sm p-8 text-center mb-8 border border-gray-100">
            <span className={`inline-block px-4 py-1.5 rounded-full text-sm font-bold bg-${selectedSubject.color}-50 text-${selectedSubject.color}-700 mb-4`}>
              {selectedSubject.name}
            </span>
            <h2 className="text-3xl font-extrabold text-gray-800 mb-2">測驗完成！</h2>
            
            <div className="flex justify-center items-center my-8">
              <div className={`w-40 h-40 rounded-full flex flex-col justify-center items-center border-[6px] shadow-inner ${
                score >= 60 ? 'border-green-400 bg-green-50' : 'border-red-400 bg-red-50'
              }`}>
                <span className={`text-5xl font-black ${score >= 60 ? 'text-green-600' : 'text-red-600'}`}>
                  {score}
                </span>
                <span className="text-sm font-bold text-gray-500 mt-1">/ 100 分</span>
              </div>
            </div>
            
            <div className="flex flex-col sm:flex-row justify-center gap-4">
              <button
                onClick={() => startQuiz(10)}
                className={`bg-${selectedSubject.color}-600 hover:bg-${selectedSubject.color}-700 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-md flex justify-center items-center`}
              >
                <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                再測驗一次 (同科目)
              </button>
              <button
                onClick={backToHome}
                className="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 px-8 rounded-xl transition-all"
              >
                回首頁選其他科目
              </button>
            </div>
          </div>

          <div className="space-y-6">
            <h3 className="text-2xl font-bold text-gray-800 px-2 flex items-center">
              <svg className={`w-6 h-6 mr-2 text-${selectedSubject.color}-500`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
              作答回顧
            </h3>
            {currentQuestions.map((q, index) => {
              const userAnswer = userAnswers[index];
              const isCorrect = userAnswer === q.answer;
              
              return (
                <div key={index} className={`bg-white rounded-2xl p-6 shadow-sm border-l-[6px] ${isCorrect ? 'border-green-500' : 'border-red-500'}`}>
                  <div className="flex justify-between items-start mb-4">
                    <span className="text-sm font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-md">第 {index + 1} 題</span>
                    {isCorrect ? (
                      <span className="bg-green-100 text-green-700 text-sm px-3 py-1 rounded-md font-bold flex items-center">
                        <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                        答對
                      </span>
                    ) : (
                      <span className="bg-red-100 text-red-700 text-sm px-3 py-1 rounded-md font-bold flex items-center">
                        <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        答錯
                      </span>
                    )}
                  </div>
                  
                  <p className="text-gray-800 font-medium mb-6 text-lg leading-relaxed">{q.question}</p>
                  
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm mb-6">
                    <div className={`p-4 rounded-xl border ${isCorrect ? 'bg-green-50 border-green-200 text-green-800' : 'bg-red-50 border-red-200 text-red-800'}`}>
                      <span className="block text-xs uppercase tracking-wider font-bold mb-1 opacity-70">您的作答</span>
                      <span className="font-semibold text-lg">{userAnswer}. </span> 
                      {q.options[userAnswer]}
                    </div>
                    {!isCorrect && (
                      <div className="p-4 rounded-xl bg-green-50 border border-green-200 text-green-800">
                        <span className="block text-xs uppercase tracking-wider font-bold mb-1 opacity-70">正確答案</span>
                        <span className="font-semibold text-lg">{q.answer}. </span> 
                        {q.options[q.answer]}
                      </div>
                    )}
                  </div>
                  
                  {/* --- 全新設計的考點與解析區塊 --- */}
                  <div className="pt-4 border-t border-gray-100 flex flex-col gap-3">
                    <div className="flex flex-wrap gap-2">
                      <span className="text-sm text-gray-600 bg-gray-50 px-3 py-1.5 rounded-md border border-gray-200 font-medium">
                        📍 考點：{q.concept}
                      </span>
                      {q.year && (
                        <span className={`text-sm text-${selectedSubject.color}-700 bg-${selectedSubject.color}-50 px-3 py-1.5 rounded-md border border-${selectedSubject.color}-200 font-medium`}>
                          📅 來源：{q.year}
                        </span>
                      )}
                    </div>
                    
                    {q.explanation && (
                      <div className="mt-2 text-sm text-gray-800 bg-amber-50 p-4 rounded-xl border border-amber-200 leading-relaxed shadow-inner">
                        <span className="font-bold text-amber-800 block mb-1 flex items-center">
                          <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                          解析說明
                        </span>
                        {q.explanation}
                      </div>
                    )}
                  </div>

                </div>
              );
            })}
          </div>
        </section>
      );

      return (
        <main className="min-h-screen font-sans py-6 md:py-10">
          <nav className="max-w-5xl mx-auto px-4 mb-8">
            <div className="flex justify-between items-center">
              <div 
                className={`flex items-center font-extrabold text-2xl tracking-tight ${appState !== 'select_subject' ? 'cursor-pointer hover:opacity-80' : ''}`}
                onClick={() => appState !== 'select_subject' && backToHome()}
              >
                <div className="bg-gray-800 text-white p-2 rounded-xl mr-3 shadow-md">
                   <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                </div>
                <span className="text-gray-800">教檢題庫</span>
              </div>
              
              {appState !== 'select_subject' && (
                <button onClick={backToHome} className="text-sm font-bold text-gray-500 hover:text-gray-800 transition-colors flex items-center">
                  <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                  回科目列表
                </button>
              )}
            </div>
          </nav>

          {appState === 'select_subject' && renderSelectSubject()}
          {appState === 'loading' && renderLoading()}
          {appState === 'error' && renderError()}
          {appState === 'ready' && renderReady()}
          {appState === 'playing' && renderPlaying()}
          {appState === 'result' && renderResult()}
        </main>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
