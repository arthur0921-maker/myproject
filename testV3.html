<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>教師資格與甄試雲端題庫系統V2.2</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 共用邏輯：多選與送分解析器 ---
    const parseCorrectAnswers = (answerStr) => {
      if (!answerStr) return [];
      if (answerStr.includes('送分')) return ['送分'];
      // 支援全形頓號、全/半形逗號、空格作為分隔符
      return answerStr.split(/[、,，\s]+/).filter(Boolean);
    };

    // --- 題庫資料設定 (支援多來源陣列與動態題數) ---
    const SUBJECTS = [
      // 📚 教檢專區 (cert)
      {
        id: 'curriculum',
        category: 'cert',
        name: '課程教學與評量',
        icon: 'M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253',
        color: 'indigo',
        choiceUrls: ['https://docs.google.com/spreadsheets/d/e/2PACX-1vSHJYiIy7UvEy3MBwiKPr9lRatsPnwQK3BbADvkNbB4KPQJz5I_4vzsD6w722XORCP8_rk5agQoc-0A/pub?gid=387485061&single=true&output=csv'],
        essayUrls: ['https://docs.google.com/spreadsheets/d/e/2PACX-1vSHJYiIy7UvEy3MBwiKPr9lRatsPnwQK3BbADvkNbB4KPQJz5I_4vzsD6w722XORCP8_rk5agQoc-0A/pub?gid=2064372488&single=true&output=csv'],
        quizLengths: [10, 20]
      },
      {
        id: 'development',
        category: 'cert',
        name: '學習者發展與適性輔導',
        icon: 'M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z',
        color: 'emerald',
        choiceUrls: ['https://docs.google.com/spreadsheets/d/e/2PACX-1vSHJYiIy7UvEy3MBwiKPr9lRatsPnwQK3BbADvkNbB4KPQJz5I_4vzsD6w722XORCP8_rk5agQoc-0A/pub?gid=1957505350&single=true&output=csv'],
        essayUrls: ['https://docs.google.com/spreadsheets/d/e/2PACX-1vSHJYiIy7UvEy3MBwiKPr9lRatsPnwQK3BbADvkNbB4KPQJz5I_4vzsD6w722XORCP8_rk5agQoc-0A/pub?gid=528168247&single=true&output=csv'],
        quizLengths: [10, 20]
      },
      {
        id: 'philosophy',
        category: 'cert',
        name: '教育理念與實務',
        icon: 'M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z',
        color: 'amber',
        choiceUrls: ['https://docs.google.com/spreadsheets/d/e/2PACX-1vSHJYiIy7UvEy3MBwiKPr9lRatsPnwQK3BbADvkNbB4KPQJz5I_4vzsD6w722XORCP8_rk5agQoc-0A/pub?gid=1911281508&single=true&output=csv'],
        essayUrls: ['https://docs.google.com/spreadsheets/d/e/2PACX-1vSHJYiIy7UvEy3MBwiKPr9lRatsPnwQK3BbADvkNbB4KPQJz5I_4vzsD6w722XORCP8_rk5agQoc-0A/pub?gid=453148307&single=true&output=csv'],
        quizLengths: [10, 20]
      },
      // 🎯 教甄專區 (select)
      {
        id: 'edu_prof_select',
        category: 'select',
        name: '教育專業科目',
        icon: 'M12 14l9-5-9-5-9 5 9 5z M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z',
        color: 'blue',
        choiceUrls: [
          'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6IGmsRF1z8ltINPxogqVlCiOyo8FNVusVRnlzncC42KScb9JzjJok_Sgiu2tqQzYXr1lhcZpWpHbq/pub?gid=0&single=true&output=csv',      
          'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6IGmsRF1z8ltINPxogqVlCiOyo8FNVusVRnlzncC42KScb9JzjJok_Sgiu2tqQzYXr1lhcZpWpHbq/pub?gid=700347504&single=true&output=csv'  
        ],
        essayUrls: [],
        quizLengths: [15, 25]
      },
      {
        id: 'info_tech_select',
        category: 'select',
        name: '資訊科技專業',
        icon: 'M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z',
        color: 'cyan',
        choiceUrls: [
          'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6IGmsRF1z8ltINPxogqVlCiOyo8FNVusVRnlzncC42KScb9JzjJok_Sgiu2tqQzYXr1lhcZpWpHbq/pub?gid=1492755242&single=true&output=csv', 
          'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6IGmsRF1z8ltINPxogqVlCiOyo8FNVusVRnlzncC42KScb9JzjJok_Sgiu2tqQzYXr1lhcZpWpHbq/pub?gid=1498861202&single=true&output=csv'  
        ],
        essayUrls: [],
        quizLengths: [15, 25]
      }
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('cert');
      const [appState, setAppState] = useState('select_subject'); 
      const [selectedSubject, setSelectedSubject] = useState(null);
      const [database, setDatabase] = useState([]);
      const [currentQuestions, setCurrentQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [userAnswers, setUserAnswers] = useState({});
      const [score, setScore] = useState(0);
      const [errorMsg, setErrorMsg] = useState('');
      const [quizLength, setQuizLength] = useState(10); 
      const [selectedYear, setSelectedYear] = useState('');

      useEffect(() => {
        const script = document.createElement('script');
        script.src = 'https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js';
        script.async = true;
        document.body.appendChild(script);
        
        return () => {
          document.body.removeChild(script);
        };
      }, []);

      const handleImgFallback = (e) => {
        const src = e.target.src;
        if (src.includes('i.meee.com.tw') && src.endsWith('.png')) {
          e.target.src = src.replace('.png', '.jpg');
        }
      };

      const formatImageUrl = (url) => {
        if (!url) return '';
        const cleanUrl = url.replace(/^"|"$/g, '').trim();
        if (!cleanUrl.startsWith('http')) return '';

        const meeeRegex = /meee\.com\.tw\/([\w-]+)(?!\.)/;
        const meeeMatch = cleanUrl.match(meeeRegex);
        if (meeeMatch && meeeMatch[1] && !cleanUrl.includes('i.meee.com.tw')) {
          return `https://i.meee.com.tw/${meeeMatch[1]}.png`;
        }

        const driveRegex = /(?:drive\.google\.com\/file\/d\/|drive\.google\.com\/open\?id=)([\w-]+)/;
        const driveMatch = cleanUrl.match(driveRegex);
        if (driveMatch && driveMatch[1]) {
          return `https://drive.google.com/uc?export=view&id=${driveMatch[1]}`;
        }
        return cleanUrl;
      };

      const parseCSVData = (csvText) => {
        const rows = [];
        let row = [];
        let curVal = '';
        let inQuotes = false;
        for (let i = 0; i < csvText.length; i++) {
          const char = csvText[i];
          const nextChar = csvText[i + 1];
          if (char === '"' && inQuotes && nextChar === '"') {
            curVal += '"'; i++; 
          } else if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            row.push(curVal.trim());
            curVal = '';
          } else if ((char === '\n' || char === '\r') && !inQuotes) {
            if (char === '\r' && nextChar === '\n') i++;
            row.push(curVal.trim());
            if (row.some(val => val !== '')) rows.push(row);
            row = []; curVal = '';
          } else {
            curVal += char;
          }
        }
        row.push(curVal.trim());
        if (row.some(val => val !== '')) rows.push(row);
        return rows;
      };

      const parseChoiceCSV = (csvText) => {
        try {
          const rows = parseCSVData(csvText);
          if (rows.length < 2) return [];

          const parsedData = [];
          for (let i = 1; i < rows.length; i++) {
            const rowData = rows[i];
            if (rowData.length >= 6) {
              const cleanOption = (text, prefix) => {
                if (!text) return "";
                let cleaned = text.replace(/^"|"$/g, '').trim();
                const regex = new RegExp(`^\\(${prefix}\\)\\s*`);
                return cleaned.replace(regex, '').trim();
              };
              parsedData.push({
                id: `choice_${Math.random().toString(36).substr(2, 9)}_${i}`,
                type: '選擇題',
                answer: rowData[0] ? rowData[0] : '',
                question: rowData[1] ? rowData[1] : '',
                options: {
                  A: cleanOption(rowData[2], 'A'),
                  B: cleanOption(rowData[3], 'B'),
                  C: cleanOption(rowData[4], 'C'),
                  D: cleanOption(rowData[5], 'D')
                },
                concept: rowData[6] ? rowData[6] : '未分類',
                year: rowData[7] ? rowData[7] : '',         
                explanation: rowData[8] ? rowData[8] : '',
                imageUrl: rowData[9] ? formatImageUrl(rowData[9]) : ''
              });
            }
          }
          return parsedData.filter(q => q.question && q.answer && q.options.A);
        } catch (err) {
          console.error("Choice CSV Parse Error:", err);
          return [];
        }
      };

      const parseEssayCSV = (csvText) => {
        try {
          const rows = parseCSVData(csvText);
          if (rows.length < 2) return [];

          const parsedData = [];
          for (let i = 1; i < rows.length; i++) {
            const rowData = rows[i];
            if (rowData.length >= 5) {
              const context = rowData[2] ? rowData[2].trim() : '';
              const questionText = rowData[3] ? rowData[3].trim() : '';
              const fullQuestion = context ? `${context}\n\n${questionText}` : questionText;
              parsedData.push({
                id: `essay_${Math.random().toString(36).substr(2, 9)}_${i}`,
                type: '問答題',
                year: rowData[0] ? rowData[0] : '',
                concept: rowData[1] ? rowData[1] : '未分類',
                question: fullQuestion,
                answer: rowData[4] ? rowData[4] : '',
                explanation: '',
                options: {}, 
                imageUrl: rowData[5] ? formatImageUrl(rowData[5]) : '' 
              });
            }
          }
          return parsedData.filter(q => q.question && q.answer);
        } catch (err) {
          console.error("Essay CSV Parse Error:", err);
          return [];
        }
      };

      const handleSubjectSelect = (subject) => {
        setSelectedSubject(subject);
        setSelectedYear('');
        fetchData(subject);
      };

      const fetchData = async (subject) => {
        setAppState('loading');
        setErrorMsg('');
        try {
          const choicePromises = subject.choiceUrls.map(url => 
            fetch(url).then(res => {
              if(!res.ok) throw new Error('連線失敗');
              return res.text();
            })
          );
          const essayPromises = (subject.essayUrls || []).map(url => 
            fetch(url).then(res => res.ok ? res.text() : null)
          );
          const choiceTexts = await Promise.all(choicePromises);
          const essayTexts = await Promise.all(essayPromises);

          let combinedData = [];
          for (const text of choiceTexts) {
            combinedData = [...combinedData, ...parseChoiceCSV(text)];
          }
          for (const text of essayTexts) {
            if (text) combinedData = [...combinedData, ...parseEssayCSV(text)];
          }

          if (combinedData.length > 0) {
            setDatabase(combinedData);
            setAppState('ready');
          } else {
            throw new Error('無法解析資料，或檔案內容為空。');
          }
        } catch (err) {
          console.error("Fetch Error:", err);
          setErrorMsg('無法載入題庫，請確認您的網路連線或連結狀態。');
          setAppState('error');
        }
      };

      const startQuiz = (numQuestions) => {
        setQuizLength(numQuestions);
        const multipleChoiceQuestions = database.filter(q => q.type !== '問答題');
        const shuffled = [...multipleChoiceQuestions].sort(() => 0.5 - Math.random());
        const selected = shuffled.slice(0, Math.min(numQuestions, multipleChoiceQuestions.length));
        
        setCurrentQuestions(selected);
        setCurrentIndex(0);
        setUserAnswers({});
        setScore(0);
        setAppState('playing');
      };

      const handleAnswerSelect = (optionKey) => {
        setUserAnswers({ ...userAnswers, [currentIndex]: optionKey });
      };

      const handleNext = () => {
        if (currentIndex < currentQuestions.length - 1) {
          setCurrentIndex(currentIndex + 1);
        } else {
          calculateScore();
          setAppState('result');
        }
      };

      // ✨ 計分邏輯更新：支援多選題與送分機制
      const calculateScore = () => {
        let currentScore = 0;
        currentQuestions.forEach((q, index) => {
          const correctAnsArr = parseCorrectAnswers(q.answer);
          const userAnswer = userAnswers[index];
          // 只要有選中其中一個正確答案，或是該題送分，即獲得滿分
          if (correctAnsArr.includes('送分') || correctAnsArr.includes(userAnswer)) {
            currentScore += 100 / currentQuestions.length; 
          }
        });
        setScore(Math.round(currentScore));
      };

      const backToHome = () => {
        setSelectedSubject(null);
        setSelectedYear('');
        setDatabase([]);
        setAppState('select_subject');
      };

      // --- 畫面渲染組件 ---

      const renderSelectSubject = () => {
        const filteredSubjects = SUBJECTS.filter(s => s.category === activeTab);
        return (
          <section className="flex flex-col items-center justify-center min-h-[60vh] px-4 animate-fade-in">
            <div className="text-center mb-10 mt-4">
              <h1 className="text-4xl md:text-5xl font-extrabold text-gray-800 mb-6 tracking-tight">
                教師檢定與甄試刷題系統
              </h1>
              
              <div className="flex flex-wrap justify-center gap-4 mb-8">
                <button
                  onClick={() => setActiveTab('cert')}
                  className={`px-8 py-3.5 rounded-2xl font-bold text-lg transition-all flex items-center shadow-sm ${
                    activeTab === 'cert'
                      ? 'bg-indigo-600 text-white shadow-md transform scale-105 border-transparent'
                      : 'bg-white text-gray-500 hover:bg-gray-50 border border-gray-200'
                  }`}
                >
                  <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                  教檢專區
                </button>
                <button
                  onClick={() => setActiveTab('select')}
                  className={`px-8 py-3.5 rounded-2xl font-bold text-lg transition-all flex items-center shadow-sm ${
                    activeTab === 'select'
                      ? 'bg-blue-600 text-white shadow-md transform scale-105 border-transparent'
                      : 'bg-white text-gray-500 hover:bg-gray-50 border border-gray-200'
                  }`}
                >
                  <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                  教甄專區
                </button>
              </div>
              
              <p className="text-lg text-gray-500 font-medium">
                請選擇 {activeTab === 'cert' ? '教師檢定' : '教師甄試'} 的測驗考科
              </p>
            </div>
            
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-5xl w-full">
              {filteredSubjects.map((sub) => (
                <button
                  key={sub.id}
                  onClick={() => handleSubjectSelect(sub)}
                  className={`group bg-white rounded-3xl p-8 shadow-sm hover:shadow-xl border border-gray-100 hover:border-${sub.color}-300 transition-all duration-300 flex flex-col items-center text-center transform hover:-translate-y-1`}
                >
                  <div className={`w-20 h-20 rounded-2xl bg-${sub.color}-50 flex items-center justify-center mb-6 group-hover:scale-110 transition-transform duration-300`}>
                    <svg className={`w-10 h-10 text-${sub.color}-600`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d={sub.icon}></path>
                    </svg>
                  </div>
                  <h3 className="text-xl font-bold text-gray-800 mb-2">{sub.name}</h3>
                  <p className={`text-sm text-gray-500 font-medium group-hover:text-${sub.color}-600 transition-colors`}>
                    點擊開始載入題庫
                  </p>
                </button>
              ))}
            </div>
          </section>
        );
      };

      const renderLoading = () => (
        <section className="flex flex-col items-center justify-center min-h-[50vh] text-center px-4 animate-fade-in">
          <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-indigo-600 mb-6"></div>
          <h2 className="text-2xl font-bold text-gray-800 mb-2">正在載入雲端題庫...</h2>
          <p className="text-gray-500">正在與 Google 試算表同步【{selectedSubject?.name}】資料</p>
        </section>
      );

      const renderError = () => (
        <section className="flex flex-col items-center justify-center min-h-[50vh] text-center px-4 animate-fade-in">
          <div className="bg-red-50 p-8 rounded-3xl border border-red-200 max-w-md w-full">
            <svg className="w-16 h-16 text-red-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <h2 className="text-2xl font-bold text-red-700 mb-2">載入失敗</h2>
            <p className="text-red-600 mb-6 text-sm leading-relaxed">{errorMsg}</p>
            <div className="flex flex-col gap-3">
              <button onClick={() => fetchData(selectedSubject)} className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md">
                重新嘗試連線
              </button>
              <button onClick={backToHome} className="w-full bg-white hover:bg-gray-50 text-gray-700 font-bold py-3 px-6 rounded-xl transition-all border border-gray-200">
                返回科目選擇
              </button>
            </div>
          </div>
        </section>
      );

      const renderReady = () => {
        const availableYears = [...new Set(database.map(q => q.year).filter(y => y !== ''))].sort((a, b) => b.localeCompare(a));
        return (
          <section className="flex flex-col items-center justify-center min-h-[50vh] text-center px-4 animate-fade-in">
            <div className={`inline-flex items-center justify-center p-4 bg-${selectedSubject.color}-50 rounded-full mb-6`}>
               <svg className={`w-12 h-12 text-${selectedSubject.color}-600`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d={selectedSubject.icon}></path>
               </svg>
            </div>
            <div className="mb-2">
              <span className={`inline-block px-3 py-1 rounded-full text-xs font-bold bg-${selectedSubject.color}-100 text-${selectedSubject.color}-700 mb-2`}>
                {selectedSubject.category === 'cert' ? '教檢考科' : '教甄考科'}
              </span>
            </div>
            <h2 className="text-3xl md:text-4xl font-bold text-gray-800 mb-2 tracking-tight">
              {selectedSubject.name}
            </h2>
            <p className="text-gray-500 mb-8 font-medium">
              題庫總計 <span className={`font-black text-${selectedSubject.color}-600 text-xl`}>{database.length}</span> 題
            </p>

            <div className="bg-white p-8 rounded-3xl shadow-lg max-w-md w-full border border-gray-100">
              
              <div className="mb-6">
                <h3 className="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">隨機模擬測驗</h3>
                <div className="grid grid-cols-2 gap-3">
                  {selectedSubject.quizLengths.map(len => (
                    <button
                      key={len}
                      onClick={() => startQuiz(len)}
                      className={`w-full bg-${selectedSubject.color}-600 hover:bg-${selectedSubject.color}-700 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-md flex justify-center items-center`}
                    >
                      {len} 題測驗
                    </button>
                  ))}
                </div>
              </div>

              {availableYears.length > 0 && (
                <div className="border-t border-gray-100 pt-6 mb-6">
                  <h3 className="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">歷屆試題與解析瀏覽</h3>
                  <div className="flex gap-2">
                    <select 
                      value={selectedYear} 
                      onChange={(e) => setSelectedYear(e.target.value)}
                      className={`flex-1 bg-gray-50 border border-gray-200 text-gray-700 text-sm rounded-xl focus:ring-${selectedSubject.color}-500 focus:border-${selectedSubject.color}-500 block p-3 outline-none cursor-pointer`}
                    >
                      <option value="">請選擇年度...</option>
                      {availableYears.map(year => (
                        <option key={year} value={year}>{year} 試題</option>
                      ))}
                    </select>
                    <button
                      onClick={() => { if(selectedYear) setAppState('year_review'); }}
                      disabled={!selectedYear}
                      className={`px-6 py-3 rounded-xl font-bold transition-all shadow-sm ${
                        selectedYear 
                          ? 'bg-gray-800 hover:bg-gray-900 text-white' 
                          : 'bg-gray-200 text-gray-400 cursor-not-allowed'
                      }`}
                    >
                      查看
                    </button>
                  </div>
                </div>
              )}

              <button
                onClick={backToHome}
                className="w-full bg-white hover:bg-gray-50 text-gray-500 font-bold py-3 px-6 rounded-xl transition-all text-sm border border-gray-200 mt-2"
              >
                返回選單重新選擇科目
              </button>
            </div>
          </section>
        );
      };

      const renderYearReview = () => {
        const reviewQuestions = database.filter(q => q.year === selectedYear);
        return (
          <section className="max-w-4xl mx-auto w-full px-4 animate-fade-in pb-12">
            <div className="bg-white rounded-3xl shadow-sm p-8 text-center mb-8 border border-gray-100 relative overflow-hidden">
              <div className={`absolute top-0 left-0 w-full h-2 bg-${selectedSubject.color}-500`}></div>
              <span className={`inline-block px-4 py-1.5 rounded-full text-sm font-bold bg-${selectedSubject.color}-50 text-${selectedSubject.color}-700 mb-4 mt-2`}>
                {selectedSubject.name}
              </span>
              <h2 className="text-3xl font-extrabold text-gray-800 mb-2">{selectedYear} 年度歷屆試題</h2>
              <p className="text-gray-500 mb-8 font-medium">共收錄 {reviewQuestions.length} 題，附完整選項與解析</p>
              
              <button
                onClick={() => {
                  setSelectedYear(''); 
                  setAppState('ready');
                }}
                className="bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-md inline-flex items-center"
              >
                <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                返回準備選單
              </button>
            </div>

            <div className="space-y-6">
              {reviewQuestions.map((q, index) => {
                const correctAnsArr = parseCorrectAnswers(q.answer);
                const isQuestionFree = correctAnsArr.includes('送分');

                return (
                  <div key={q.id} className={`bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-gray-100`}>
                    
                    {q.type === '問答題' ? (
                      <div className="bg-indigo-50/50 p-2 md:p-4 rounded-2xl border-none">
                        <div className="flex justify-between items-start mb-4">
                          <span className={`text-sm font-extrabold text-${selectedSubject.color}-700 bg-${selectedSubject.color}-50 px-4 py-1.5 rounded-lg`}>
                            第 {index + 1} 題 (問答)
                          </span>
                          <span className="inline-block bg-indigo-600 text-white text-xs px-3 py-1.5 rounded-md font-bold">
                            ✍️ 問答申論題
                          </span>
                        </div>
                        <p className="text-gray-800 font-semibold mb-6 text-lg md:text-xl leading-relaxed whitespace-pre-wrap">{q.question}</p>
                        {q.imageUrl && (
                          <div className="mb-8 flex justify-center">
                            <img src={q.imageUrl} alt={`第 ${index + 1} 題附圖`} onError={handleImgFallback} className="max-w-full h-auto rounded-xl shadow-sm border border-gray-200" loading="lazy" />
                          </div>
                        )}
                        <div className="bg-white rounded-xl p-6 shadow-sm border border-indigo-100 mt-6">
                          <span className="block text-sm uppercase tracking-wider font-bold mb-3 text-indigo-800 flex items-center">
                            <svg className="w-5 h-5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            AI參考解答
                          </span>
                          <div className="text-gray-700 leading-relaxed font-medium whitespace-pre-wrap">
                            {q.answer}
                          </div>
                        </div>
                        <div className="mt-4 flex flex-wrap gap-2">
                          <span className="text-sm text-gray-600 bg-gray-50 px-3 py-1.5 rounded-md border border-gray-200 font-medium">
                            📍 考點：{q.concept}
                          </span>
                        </div>
                      </div>
                    ) : (
                      <div>
                        <div className="flex justify-between items-start mb-6">
                          <span className={`text-sm font-extrabold text-${selectedSubject.color}-700 bg-${selectedSubject.color}-50 px-4 py-1.5 rounded-lg`}>
                            第 {index + 1} 題
                          </span>
                          {isQuestionFree && (
                            <span className="inline-block bg-blue-100 text-blue-700 text-xs px-3 py-1.5 rounded-md font-bold border border-blue-200">
                              🎁 送分題
                            </span>
                          )}
                        </div>
                        <p className="text-gray-800 font-semibold mb-8 text-lg md:text-xl leading-relaxed whitespace-pre-wrap">{q.question}</p>
                        {q.imageUrl && (
                          <div className="mb-8 flex justify-center">
                            <img src={q.imageUrl} alt={`第 ${index + 1} 題附圖`} onError={handleImgFallback} className="max-w-full h-auto rounded-xl shadow-sm border border-gray-200" loading="lazy" />
                          </div>
                        )}
                        <div className="grid grid-cols-1 gap-3 text-sm mb-6">
                          {['A', 'B', 'C', 'D'].map(opt => {
                             if (!q.options[opt]) return null;
                             const isCorrectOption = isQuestionFree || correctAnsArr.includes(opt);
                             return (
                               <div key={opt} className={`p-4 rounded-xl border-2 transition-all ${
                                 isCorrectOption 
                                   ? 'bg-green-50 border-green-400 text-green-900 shadow-sm' 
                                   : 'bg-white border-gray-100 text-gray-500'
                               }`}>
                                 <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                                   <div className="flex items-start">
                                     <span className={`font-bold mr-3 text-lg flex-shrink-0 ${isCorrectOption ? 'text-green-600' : 'text-gray-400'}`}>
                                       {opt}.
                                     </span>
                                     <span className="text-md pt-0.5 leading-relaxed flex-1 whitespace-pre-wrap">{q.options[opt]}</span>
                                   </div>
                                   {isCorrectOption && (
                                      <span className="mt-2 sm:mt-0 inline-flex items-center bg-green-500 text-white text-xs px-2.5 py-1 rounded-md font-bold tracking-wider flex-shrink-0 shadow-sm">
                                       <svg className="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                                       {isQuestionFree ? '送分選項' : '正確答案'}
                                     </span>
                                   )}
                                 </div>
                               </div>
                             );
                          })}
                        </div>
                        
                        <div className="pt-6 border-t border-gray-100 flex flex-col gap-3">
                          <div className="flex flex-wrap gap-2">
                            <span className="text-sm text-gray-600 bg-gray-50 px-3 py-1.5 rounded-md border border-gray-200 font-medium">
                              📍 考點：{q.concept}
                            </span>
                          </div>
                          {q.explanation && (
                            <div className="mt-2 text-sm text-gray-800 bg-amber-50 p-5 rounded-xl border border-amber-200 leading-relaxed shadow-inner">
                              <span className="font-bold text-amber-800 block mb-2 flex items-center text-base">
                                <svg className="w-5 h-5 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                解析說明
                              </span>
                              <span className="text-amber-900/90 whitespace-pre-wrap">{q.explanation}</span>
                            </div>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            <div className="mt-10 pt-8 border-t border-gray-200 flex flex-col sm:flex-row justify-center gap-4">
              <button
                onClick={() => {
                  setSelectedYear('');
                  setAppState('ready');
                }}
                className="bg-gray-800 hover:bg-gray-900 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-md inline-flex items-center justify-center"
              >
                <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                返回準備選單
              </button>
              
              <button
                onClick={backToHome}
                className="bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 font-bold py-3 px-8 rounded-xl transition-all shadow-sm inline-flex items-center justify-center"
              >
                <svg className="w-5 h-5 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                首頁考科列表
              </button>
            </div>
          </section>
        );
      };

      const renderPlaying = () => {
        const question = currentQuestions[currentIndex];
        const isAnswered = !!userAnswers[currentIndex];
        const progress = ((currentIndex + 1) / currentQuestions.length) * 100;
        
        return (
          <article className="max-w-3xl mx-auto w-full px-4 animate-fade-in">
            <div className="mb-8">
              <div className="flex justify-between items-end mb-2">
                <span className={`text-sm font-bold text-${selectedSubject.color}-600 bg-${selectedSubject.color}-50 px-3 py-1 rounded-full`}>
                  {selectedSubject.name}
                </span>
                <span className="text-sm font-medium text-gray-500">
                  第 {currentIndex + 1} / {currentQuestions.length} 題
                </span>
              </div>
              <div className="w-full bg-gray-200 rounded-full h-2.5 mt-3">
                <div className={`bg-${selectedSubject.color}-600 h-2.5 rounded-full transition-all duration-300`} style={{ width: `${progress}%` }}></div>
              </div>
            </div>

            <div className="bg-white rounded-3xl shadow-sm p-6 md:p-8 mb-6 border border-gray-100">
              <div className="flex justify-between items-center mb-6">
                <div className="flex gap-2">
                   <span className="inline-block bg-gray-100 text-gray-600 text-xs px-3 py-1.5 rounded-md font-medium">
                     考點：{question.concept}
                   </span>
                   {question.year && (
                     <span className="inline-block bg-blue-50 text-blue-600 text-xs px-3 py-1.5 rounded-md font-medium border border-blue-100">
                       {question.year}
                     </span>
                   )}
                </div>
              </div>
              <h2 className="text-xl md:text-2xl font-semibold text-gray-800 leading-relaxed mb-8 whitespace-pre-wrap">
                {question.question}
              </h2>

              {question.imageUrl && (
                <div className="mb-8 flex justify-center">
                  <img src={question.imageUrl} alt="題目附圖" onError={handleImgFallback} className="max-w-full h-auto rounded-xl shadow-sm border border-gray-200" loading="lazy" />
                </div>
              )}

              <div className="space-y-3">
                {['A', 'B', 'C', 'D'].map((key) => {
                  if (!question.options[key]) return null;
                  return (
                    <button
                      key={key}
                      onClick={() => handleAnswerSelect(key)}
                      className={`w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-start ${
                        userAnswers[currentIndex] === key
                          ? `border-${selectedSubject.color}-600 bg-${selectedSubject.color}-50 text-${selectedSubject.color}-900 shadow-sm`
                          : `border-gray-200 hover:border-${selectedSubject.color}-300 hover:bg-gray-50 text-gray-700`
                      }`}
                    >
                      <span className={`font-bold mr-3 text-lg flex-shrink-0 ${userAnswers[currentIndex] === key ? `text-${selectedSubject.color}-600` : 'text-gray-400'}`}>
                        {key}.
                      </span>
                      <span className="text-md pt-0.5 leading-relaxed whitespace-pre-wrap">{question.options[key]}</span>
                    </button>
                  )
                })}
              </div>
            </div>

            <div className="flex justify-between mt-8">
              <button
                 onClick={() => {
                   if(window.confirm('確定要放棄目前的測驗進度嗎？')) setAppState('ready');
                 }}
                 className="px-6 py-3 rounded-xl font-bold text-gray-400 hover:bg-gray-100 hover:text-gray-600 transition-all"
              >
                中斷測驗
              </button>
              <button
                onClick={handleNext}
                disabled={!isAnswered}
                className={`px-8 py-3 rounded-xl font-bold transition-all flex items-center ${
                  isAnswered
                    ? `bg-${selectedSubject.color}-600 hover:bg-${selectedSubject.color}-700 text-white shadow-md`
                    : 'bg-gray-200 text-gray-400 cursor-not-allowed'
                }`}
              >
                {currentIndex < currentQuestions.length - 1 ? '下一題' : '提交並查看成績'}
                {isAnswered && currentIndex < currentQuestions.length - 1 && (
                  <svg className="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>
                )}
              </button>
            </div>
          </article>
        );
      };

      // ✨ 測驗回顧畫面更新：4種狀態與送分標示
      const renderResult = () => (
        <section className="max-w-4xl mx-auto w-full px-4 animate-fade-in pb-12">
          <div className="bg-white rounded-3xl shadow-sm p-8 text-center mb-8 border border-gray-100 relative overflow-hidden">
            <div className={`absolute top-0 left-0 w-full h-2 bg-${selectedSubject.color}-500`}></div>
            <span className={`inline-block px-4 py-1.5 rounded-full text-sm font-bold bg-${selectedSubject.color}-50 text-${selectedSubject.color}-700 mb-4 mt-2`}>
              {selectedSubject.name} ({quizLength}題)
            </span>
            <h2 className="text-3xl font-extrabold text-gray-800 mb-2">測驗完成！</h2>
            
            <div className="flex justify-center items-center my-8">
              <div className={`w-40 h-40 rounded-full flex flex-col justify-center items-center border-[6px] shadow-inner ${
                score >= 60 ? 'border-green-400 bg-green-50' : 'border-red-400 bg-red-50'
              }`}>
                <span className={`text-5xl font-black ${score >= 60 ? 'text-green-600' : 'text-red-600'}`}>
                  {score}
                </span>
                <span className="text-sm font-bold text-gray-500 mt-1">/ 100 分</span>
              </div>
            </div>
            
            <div className="flex flex-col sm:flex-row justify-center gap-4">
              <button
                onClick={() => startQuiz(quizLength)}
                className={`bg-${selectedSubject.color}-600 hover:bg-${selectedSubject.color}-700 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-md flex justify-center items-center`}
              >
                <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                重新抽題測驗
              </button>
              <button
                onClick={() => setAppState('ready')}
                className="bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 px-8 rounded-xl transition-all"
              >
                返回準備畫面
              </button>
            </div>
          </div>

          <div className="space-y-6">
            <h3 className="text-2xl font-bold text-gray-800 px-2 flex items-center">
              <svg className={`w-6 h-6 mr-2 text-${selectedSubject.color}-500`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
              作答回顧
            </h3>
            {currentQuestions.map((q, index) => {
              const userAnswer = userAnswers[index];
              const correctAnsArr = parseCorrectAnswers(q.answer);
              const isQuestionFree = correctAnsArr.includes('送分');
              const isQuestionCorrect = isQuestionFree || correctAnsArr.includes(userAnswer);
              
              return (
                <div key={index} className={`bg-white rounded-2xl p-6 shadow-sm border-l-[6px] ${isQuestionCorrect ? 'border-green-500' : 'border-red-500'}`}>
                  <div className="flex justify-between items-start mb-4">
                    <span className="text-sm font-bold text-gray-500 bg-gray-100 px-3 py-1 rounded-md">第 {index + 1} 題</span>
                    {isQuestionFree ? (
                       <span className="bg-blue-100 text-blue-700 text-sm px-3 py-1 rounded-md font-bold flex items-center border border-blue-200">
                         🎁 送分題
                       </span>
                    ) : isQuestionCorrect ? (
                      <span className="bg-green-100 text-green-700 text-sm px-3 py-1 rounded-md font-bold flex items-center">
                        <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                        答對
                      </span>
                    ) : (
                      <span className="bg-red-100 text-red-700 text-sm px-3 py-1 rounded-md font-bold flex items-center">
                        <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        答錯
                      </span>
                    )}
                  </div>
                  
                  <p className="text-gray-800 font-medium mb-6 text-lg leading-relaxed whitespace-pre-wrap">{q.question}</p>
                  
                  {q.imageUrl && (
                    <div className="mb-8 flex justify-center">
                      <img src={q.imageUrl} alt={`第 ${index + 1} 題附圖`} onError={handleImgFallback} className="max-w-full h-auto rounded-xl shadow-sm border border-gray-200" loading="lazy" />
                    </div>
                  )}

                  <div className="grid grid-cols-1 gap-3 text-sm mb-6">
                    {['A', 'B', 'C', 'D'].map(opt => {
                      if (!q.options[opt]) return null;
                      
                      const isSelected = userAnswer === opt;
                      const isCorrectOption = isQuestionFree || correctAnsArr.includes(opt);
                      
                      let boxStyle = "bg-white border-gray-100 text-gray-500";
                      let badge = null;

                      if (isSelected && isCorrectOption) {
                        boxStyle = "bg-green-50 border-green-400 text-green-900 shadow-sm border-2";
                        badge = <span className="text-xs bg-green-500 text-white px-2.5 py-1 rounded-md font-bold shadow-sm flex items-center"><svg className="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>您的作答 (正確)</span>;
                      } else if (isSelected && !isCorrectOption) {
                        boxStyle = "bg-red-50 border-red-400 text-red-900 shadow-sm border-2";
                        badge = <span className="text-xs bg-red-500 text-white px-2.5 py-1 rounded-md font-bold shadow-sm flex items-center"><svg className="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>您的作答 (答錯)</span>;
                      } else if (!isSelected && isCorrectOption) {
                        boxStyle = "bg-green-50/50 border-green-300 text-green-800 border-2";
                        const badgeText = isQuestionFree ? "🎁 送分選項" : (isQuestionCorrect ? "💡 其他正確選項" : "🎯 正確解答");
                        badge = <span className="text-xs bg-green-100 text-green-700 border border-green-300 px-2.5 py-1 rounded-md font-bold flex items-center">{badgeText}</span>;
                      } else {
                        boxStyle = "bg-white border-gray-200 text-gray-500 border";
                      }

                      return (
                        <div key={opt} className={`p-4 rounded-xl transition-all flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 ${boxStyle}`}>
                          <div className="flex items-start">
                            <span className={`font-bold mr-3 text-lg flex-shrink-0 ${isCorrectOption ? 'text-green-600' : (isSelected ? 'text-red-500' : 'text-gray-400')}`}>{opt}.</span>
                            <span className="text-md pt-0.5 leading-relaxed whitespace-pre-wrap">{q.options[opt]}</span>
                          </div>
                          {badge && <div className="flex-shrink-0 self-end sm:self-auto">{badge}</div>}
                        </div>
                      );
                    })}
                  </div>
                  
                  <div className="pt-4 border-t border-gray-100 flex flex-col gap-3">
                    <div className="flex flex-wrap gap-2">
                      <span className="text-sm text-gray-600 bg-gray-50 px-3 py-1.5 rounded-md border border-gray-200 font-medium">
                        📍 考點：{q.concept}
                      </span>
                      {q.year && (
                        <span className={`text-sm text-${selectedSubject.color}-700 bg-${selectedSubject.color}-50 px-3 py-1.5 rounded-md border border-${selectedSubject.color}-200 font-medium`}>
                          📅 來源：{q.year}
                        </span>
                      )}
                    </div>
                    
                    {q.explanation && (
                      <div className="mt-2 text-sm text-gray-800 bg-amber-50 p-4 rounded-xl border border-amber-200 leading-relaxed shadow-inner">
                        <span className="font-bold text-amber-800 block mb-1 flex items-center text-base">
                          <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                          解析說明
                        </span>
                        <span className="whitespace-pre-wrap">{q.explanation}</span>
                      </div>
                    )}
                  </div>

                </div>
              );
            })}
          </div>
        </section>
      );

      return (
        <div className="min-h-screen flex flex-col font-sans bg-slate-50">
          <main className="flex-grow py-6 md:py-10">
            <nav className="max-w-5xl mx-auto px-4 mb-8">
              <div className="flex justify-between items-center">
                <div 
                  className={`flex items-center font-extrabold text-2xl tracking-tight ${appState !== 'select_subject' ? 'cursor-pointer hover:opacity-80' : ''}`}
                  onClick={() => appState !== 'select_subject' && backToHome()}
                >
                  <div className="bg-gray-800 text-white p-2 rounded-xl mr-3 shadow-md">
                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                  </div>
                  <span className="text-gray-800">師培題庫系統</span>
                </div>
                
                {appState !== 'select_subject' && (
                  <button onClick={backToHome} className="text-sm font-bold text-gray-500 hover:text-gray-800 transition-colors flex items-center">
                    <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    首頁考科列表
                  </button>
                )}
              </div>
            </nav>

            {appState === 'select_subject' && renderSelectSubject()}
            {appState === 'loading' && renderLoading()}
            {appState === 'error' && renderError()}
            {appState === 'ready' && renderReady()}
            {appState === 'playing' && renderPlaying()}
            {appState === 'result' && renderResult()}
            {appState === 'year_review' && renderYearReview()}
          </main>

          <footer className="w-full py-6 mt-8 border-t border-gray-200 bg-white/60">
            <div className="max-w-5xl mx-auto px-4 text-center">
              <div className="text-sm font-medium text-gray-400 tracking-wide flex justify-center items-center gap-2 flex-wrap">
                <span>網站製作宣告 By Arthur WU 2026</span>
                <span className="hidden sm:inline">|</span>
                <span id="busuanzi_container_site_pv" style={{ display: 'none' }}>
                  本站累積瀏覽次數：<span id="busuanzi_value_site_pv" className="font-bold text-gray-500"></span> 次
                </span>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
